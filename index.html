                    }
                    if (state.modals.resForm && state.resForm.endDate) {
                        const endDateInput = document.getElementById('i-res-end-date');
                        if (endDateInput) endDateInput.value = state.resForm.endDate;
                    }

                } catch (e) {
                    console.error(e);
                    const root = document.getElementById('app-root');
                    if (root) {
                        const msg = (e && e.message) ? e.message : String(e || 'Bilinmeyen hata');
                        root.innerHTML = '<div class="p-4 text-sm text-red-300 bg-slate-900">Uygulama hata verdi: ' + msg + '</div>';
                    }
                }
            }

            // YENİ: CHANGE/INPUT EVENT LISTENER (Trip Select Box İçin)
            // 'input' event'i datalist seçimlerinde daha tutarlıdır
            document.addEventListener('input', e => {

                // Hızlı Harcama (pop-up) alanları: trip / tutar / para birimi / ödeyen
                if (e.target.id === 'q-trip') {
                    const baseCur = state.baseCurrency || BASE_CURRENCY;
                    state.quickExp = state.quickExp || { trip: '', cat: 'food', amt: '', cur: baseCur, payer: '' };
                    state.quickExp.trip = e.target.value || '';

                    const typed = String(e.target.value || '').trim();
                    const tripObj = (state.trips || []).find(t => String(t.name || '').trim().toLowerCase() === typed.toLowerCase());
                    const persons = (tripObj && tripObj.persons)
                        ? String(tripObj.persons).split(',').map(p => p.trim()).filter(Boolean)
                        : [];

                    if (persons.length) {
                        if (!persons.includes(state.quickExp.payer)) {
                            state.quickExp.payer = persons[0] || '';
                        }
                    } else {
                        state.quickExp.payer = '';
                    }

                    const tcur = getCurrencyForTrip(typed) || baseCur;
                    if (!state.quickExp.cur) state.quickExp.cur = tcur;

                    renderApp();
                    return;
                }

                if (e.target.id === 'q-amt') {
                    const baseCur = state.baseCurrency || BASE_CURRENCY;
                    state.quickExp = state.quickExp || { trip: '', cat: 'food', amt: '', cur: baseCur, payer: '' };
                    state.quickExp.amt = e.target.value;
                    return;
                }

                if (e.target.id === 'q-cur') {
                    const baseCur = state.baseCurrency || BASE_CURRENCY;
                    state.quickExp = state.quickExp || { trip: '', cat: 'food', amt: '', cur: baseCur, payer: '' };
                    state.quickExp.cur = e.target.value;
                    return;
                }

                if (e.target.id === 'q-payer-free') {
                    const baseCur = state.baseCurrency || BASE_CURRENCY;
                    state.quickExp = state.quickExp || { trip: '', cat: 'food', amt: '', cur: baseCur, payer: '' };
                    state.quickExp.payer = e.target.value;
                    return;
                }

                // Harcama Formu Trip Seçimi
                if (e.target.id === 'i-trip') {
                    if (e.target.value === '__new__') {
                        state.tripForm = getEmptyTripForm();
                        state.modals.tripForm = true;
                        e.target.value = '';
                        renderApp();
                    } else {
                        // Trip seçildi
                        state.form.trip = e.target.value;
                        // Seyahat'in kişi bilgisi var mı kontrol et
                        const tripObj = state.trips.find(t => t.name === state.form.trip);
                        if (tripObj && tripObj.persons) {
                            state.form.isIndividual = false; // Ortak harcamaya çevir ki Payer alanı görünsün
                        }
                        renderApp();
                    }
                }

                // Rezervasyon Formu Trip Seçimi
                if (e.target.id === 'i-res-trip') {
                    if (e.target.value === '__new__') {
                        // Önce mevcut form değerlerini kaydet
                        const nameInput = document.getElementById('i-res-name');
                        if (nameInput) state.resForm.name = nameInput.value;
                        const locInput = document.getElementById('i-res-location');
                        if (locInput) state.resForm.location = locInput.value;
                        const codeInput = document.getElementById('i-res-code');
                        if (codeInput) state.resForm.code = codeInput.value;
                        const costInput = document.getElementById('i-res-cost');
                        if (costInput) state.resForm.cost = costInput.value;
                        const notesInput = document.getElementById('i-res-notes');
                        if (notesInput) state.resForm.notes = notesInput.value;

                        state.tripForm = getEmptyTripForm();
                        state.modals.tripForm = true;
                        e.target.value = '';
                        renderApp();
                    } else {
                        // Önce mevcut form değerlerini kaydet
                        const nameInput = document.getElementById('i-res-name');
                        if (nameInput) state.resForm.name = nameInput.value;
                        const locInput = document.getElementById('i-res-location');
                        if (locInput) state.resForm.location = locInput.value;
                        const codeInput = document.getElementById('i-res-code');
                        if (codeInput) state.resForm.code = codeInput.value;
                        const costInput = document.getElementById('i-res-cost');
                        if (costInput) state.resForm.cost = costInput.value;
                        const notesInput = document.getElementById('i-res-notes');
                        if (notesInput) state.resForm.notes = notesInput.value;

                        state.resForm.trip = e.target.value;
                        const tripObj = state.trips.find(t => t.name === state.resForm.trip);
                        if (tripObj && tripObj.persons) {
                            state.resForm.isIndividual = false;
                        }
                        renderApp();
                    }
                }
            });

            // DRAG AND DROP HANDLERS (Kaldırıldı)
            window.handleDragStart = (e) => { e.preventDefault(); };
            window.handleDragOver = (e) => { e.preventDefault(); };
            window.handleDrop = (e) => { e.preventDefault(); };
            window.handleDragEnd = (e) => { e.preventDefault(); };

            document.addEventListener('click', e => {
                const t = e.target;
                const actEl = t.closest('[data-act]');
                const act = actEl ? actEl.dataset.act : null;
                const val = actEl ? actEl.dataset.val : null;
                const id = actEl ? actEl.dataset.id : null;

                // Kullanıcı menüsünü, ikon ve menü dışına tıklanınca kapat
                const userMenu = document.getElementById('auth-user-menu');
                if (userMenu && !t.closest('#auth-user-menu') && !t.closest('#auth-btn-login-toggle')) {
                    userMenu.classList.add('hidden');
                }

                // Modal dışına tıklayınca kapatma (Overlay kontrolü)
                if (state.view === 'form' && t.classList.contains('form-modal-overlay')) {
                    state.view = 'list'; state.err = ''; renderApp(); return;
                }
                if (state.modals.resForm && t.classList.contains('form-modal-overlay')) {
                    state.modals.resForm = false; state.err = ''; state.tab = 'other';
                    state.helpersAccordion.reservations = true; // Geri dönünce rezervasyonlar açık kalsın
                    renderApp(); return;
                }

                // HELPER MODAL AÇILIŞLARINI YAKALA VE STATE'E İŞLE
                const helperLink = t.closest('a');
                const href = helperLink ? helperLink.getAttribute('href') : null;
                if (href && href.startsWith('#helper-')) {
                    const helperId = href.substring(8); // 'reservations', 'report' vb.
                    if (state.helpersAccordion[helperId] !== undefined) {
                        // Diğerlerini kapat, seçileni aç
                        Object.keys(state.helpersAccordion).forEach(k => state.helpersAccordion[k] = false);
                        state.helpersAccordion[helperId] = true;
                        renderApp();
                        return;
                    }
                }

                if (!actEl) return;

                // Login gerektiren işlemler için kontrol
                const requiresAuth = actEl.dataset.auth === 'required';
                if (requiresAuth && !currentUser) {
                    openLoginModal('Bu özelliği kullanmak için giriş yapmanız gerekir.');
                    return;
                }

                // Auth ile ilgili aksiyonlar
                if (act === 'auth-open') {
                    if (currentUser) {
                        toggleUserMenu();
                    } else {
                        openLoginModal('Gelişmiş özellikler ve PDF dökümü için giriş yapmanız gerekir.');
                    }
                    return;
                }

                if (act === 'auth-close') {
                    closeLoginModal();
                    return;
                }
                if (act === 'auth-logout') {
                    if (auth) {
                        auth.signOut().catch(err => console.error('Çıkış hatası', err));
                    }
                    currentUser = null;
                    updateAuthUi();
                    closeLoginModal();
                    toggleUserMenu(true);
                    return;
                }

                // YENİ: Generic Modal Kapatma Handler (Navigasyon Düzeltmesi ile)
                if (act === 'close-mod') {
                    if (val === 'resDetail' || val === 'resDetailOverlay' || val === 'resForm') {
                        state.modals.resDetail = false;
                        state.modals.resForm = false;
                        state.tab = 'other';
                        // Tüm accordion'ları kapat, sadece reservations'u aç
                        state.helpersAccordion = {
                            critical: false,
                            places: false,
                            health: false,
                            transport: false,
                            flightCheck: false,
                            route: false,
                            report: false,
                            data: false,
                            reservations: true
                        };
                        renderApp();
                        setTimeout(() => {
                            const el = document.getElementById('helper-reservations');
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 300);
                        return;
                    }
                    // Diğer modallar için genel kapatma
                    if (val && state.modals[val] !== undefined) {
                        state.modals[val] = false;
                        renderApp();
                        return;
                    }
                    // Overlay kapatma (val ismi modal ismiyle uyuşuyorsa veya özel case varsa)
                    if (val === 'tripForm') { state.modals.tripForm = false; renderApp(); return; }
                }

                if (act === 'auth-google') {
                    if (!auth) {
                        initFirebaseAuth();
                    }
                    if (auth && firebase && firebase.auth) {
                        const provider = new firebase.auth.GoogleAuthProvider();
                        // Her girişte hesap seçme ekranını göster
                        provider.setCustomParameters({ prompt: 'select_account' });

                        auth.signInWithPopup(provider)
                            .then((result) => {
                                console.log('Google ile giriş başarılı:', result && result.user);

                                if (result && result.user) {
                                    currentUser = result.user;
                                } else if (auth.currentUser) {
                                    currentUser = auth.currentUser;
                                }

                                updateAuthUi();
                                if (currentUser) {
                                    loadUserDataFromCloud();
                                }

                                // Login modali kapanır, kullanıcı menüsü varsa gizlenir
                                closeLoginModal();
                                toggleUserMenu(true);
                            })
                            .catch(err => {
                                console.error('Google ile giriş hatası', err);
                                alert('Google ile giriş yapılamadı: ' + (err && err.message ? err.message : err));
                            });
                    }
                    return;
                }
                if (act === 'auth-email-login' || act === 'auth-email-register') {
                    if (!auth) {
                        initFirebaseAuth();
                    }
                    const emailInput = document.getElementById('auth-email-input');
                    const passInput = document.getElementById('auth-password-input');
                    const email = emailInput ? emailInput.value.trim() : '';
                    const pass = passInput ? passInput.value.trim() : '';

                    if (!email || !pass) {
                        alert('Lütfen e-posta ve şifre girin.');
                        return;
                    }

                    const actionPromise = (act === 'auth-email-register')
                        ? auth.createUserWithEmailAndPassword(email, pass)
                        : auth.signInWithEmailAndPassword(email, pass);

                    actionPromise
                        .then(() => {
                            closeLoginModal();
                        })
                        .catch(err => {
                            console.error('E-posta ile giriş/kayıt hatası', err);
                            alert('İşlem başarısız: ' + (err && err.message ? err.message : err));
                        });
                    return;
                }


                if (act === 'get-location') {
                    handleGeolocation();
                    return;
                }

                if (act === 'close-all-helpers') {
                    Object.keys(state.helpersAccordion).forEach(k => state.helpersAccordion[k] = false);
                    renderApp();
                    return;
                }


                if (act === 'tog-accordion') {
                    const currentStatus = state.helpersAccordion[val];
                    const newAccordionState = {};
                    Object.keys(state.helpersAccordion).forEach(key => {
                        newAccordionState[key] = false;
                    });

                    if (!currentStatus) {
                        newAccordionState[val] = true;
                        if (val === 'report') {
                            const allTrips = [...new Set(state.exp.map(x => x.trip).filter(Boolean).concat(state.res.map(x => x.trip).filter(Boolean)))].sort();
                            if (allTrips.length > 0 && !allTrips.includes(state.selectedReportTrip)) {
                                state.selectedReportTrip = allTrips[0];
                            } else if (allTrips.length === 0) {
                                state.selectedReportTrip = 'Genel';
                            }
                        }
                        if (['places', 'health'].includes(val) && !state.location) {
                            handleGeolocation();
                        }
                    }

                    setState({ helpersAccordion: newAccordionState });
                    return;
                }

                if (act === 'tab') {
                    if (val === 'sum' || val === 'exp' || val === 'chk' || val === 'other') {
                        state.tab = val;
                        state.search = '';
                        if (val === 'other') {
                            handleGeolocation();
                        }
                    }
                    renderApp();
                }
                if (act === 'new') {
                    state.form = getEmptyForm();
                    if (state.tripFilter) {
                        state.form.trip = state.tripFilter;
                        const suggestedCur = getCurrencyForTrip(state.tripFilter);
                        if (suggestedCur) {
                            state.form.cur = suggestedCur;
                        } else {
                            state.form.cur = state.baseCurrency || BASE_CURRENCY;
                        }
                    } else {
                        state.form.cur = state.baseCurrency || BASE_CURRENCY;
                    }
                    state.view = 'form';
                    state.form.isFuel = false;
                    renderApp();
                }

                if (act === 'open-quick-exp') {
                    state.quickExpOpen = !state.quickExpOpen;
                    if (state.quickExpOpen) {
                        const baseCur = state.baseCurrency || BASE_CURRENCY;
                        if (!state.quickExp) {
                            state.quickExp = { trip: '', cat: 'food', amt: '', cur: baseCur, payer: '' };
                        }
                        if (state.tripFilter) {
                            state.quickExp.trip = state.tripFilter;
                            const tcur = getCurrencyForTrip(state.tripFilter);
                            state.quickExp.cur = tcur || baseCur;

                            const tripObj = (state.trips || []).find(t => String(t.name || '').trim().toLowerCase() === String(state.tripFilter || '').trim().toLowerCase());
                            const persons = (tripObj && tripObj.persons)
                                ? String(tripObj.persons).split(',').map(p => p.trim()).filter(Boolean)
                                : [];
                            state.quickExp.payer = persons.length ? (persons[0] || '') : '';
                        } else {
                            const tcur = getCurrencyForTrip(state.quickExp.trip || '');
                            state.quickExp.cur = tcur || baseCur;

                            const tripObj = (state.trips || []).find(t => String(t.name || '').trim().toLowerCase() === String(state.quickExp.trip || '').trim().toLowerCase());
                            const persons = (tripObj && tripObj.persons)
                                ? String(tripObj.persons).split(',').map(p => p.trim()).filter(Boolean)
                                : [];
                            if (persons.length && !persons.includes(state.quickExp.payer)) state.quickExp.payer = persons[0] || '';
                            if (!persons.length) state.quickExp.payer = '';
                        }
                    }
                    state.err = '';
                    renderApp();
                    return;
                }
                if (act === 'quick-set-cat') {
                    const baseCur = state.baseCurrency || BASE_CURRENCY;
                    state.quickExp = state.quickExp || { trip: '', cat: 'food', amt: '', cur: baseCur, payer: '' };
                    state.quickExp.cat = val || 'food';
                    renderApp();
                    return;
                }
                if (act === 'quick-set-payer') {
                    const baseCur = state.baseCurrency || BASE_CURRENCY;
                    state.quickExp = state.quickExp || { trip: '', cat: 'food', amt: '', cur: baseCur, payer: '' };
                    state.quickExp.payer = val || '';
                    renderApp();
                    return;
                }
                if (act === 'save-quick-exp') {
                    const tripInput = document.getElementById('q-trip');
                    const amtInput = document.getElementById('q-amt');

                    const tripRaw = tripInput ? tripInput.value.trim() : '';
                    const trip = titleCase(tripRaw);
                    const amt = parseFloat(amtInput ? amtInput.value : '');
                    const cat = (state.quickExp && state.quickExp.cat) || 'other';

                    if (!trip || !amt || isNaN(amt) || amt <= 0) {
                        state.err = 'Lütfen seyahat ve tutar bilgilerini girin.';
                        renderApp();
                        return;
                    }

                    const curEl = document.getElementById('q-cur');
                    const curSel = curEl ? String(curEl.value || '').trim() : '';
                    const baseCur = state.baseCurrency || BASE_CURRENCY;
                    const cur = curSel || (state.quickExp && String(state.quickExp.cur || '').trim()) || getCurrencyForTrip(trip) || baseCur;

                    // Ödeyen (varsa seyahatteki kişilerden seçilmiş olmalı)
                    const tripObj = (state.trips || []).find(t => String(t.name || '').trim().toLowerCase() === trip.toLowerCase());
                    const persons = (tripObj && tripObj.persons)
                        ? String(tripObj.persons).split(',').map(p => p.trim()).filter(Boolean)
                        : [];

                    let payer = (state.quickExp && String(state.quickExp.payer || '').trim()) || '';

                    if (!persons.length) {
                        const pf = document.getElementById('q-payer-free');
                        const pr = pf ? String(pf.value || '').trim() : '';
                        if (pr) payer = titleCase(pr);
                    } else {
                        if (!payer) payer = persons[0] || '';
                        if (payer && !persons.includes(payer)) payer = persons[0] || '';
                        if (!payer) {
                            state.err = 'Lütfen ödeyen kişiyi seçin.';
                            renderApp();
                            return;
                        }
                    }


                    const now = new Date();
                    const dateStr = now.toISOString().split('T')[0];
                    const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

                    const defaultPlaceMap = {
                        food: 'Cafe',
                        shopping: 'Market',
                        transport: 'Ulaşım',
                        other: 'Diğer'
                    };

                    const newExp = {
                        id: genId(),
                        trip,
                        city: 'Genel',
                        place: defaultPlaceMap[cat] || 'Hızlı Harcama',
                        cat,
                        type: EXPENSE_TYPES[0].id,
                        isIndividual: false,
                        payer,
                        amt,
                        cur,
                        date: dateStr,
                        time: timeStr,
                        imgs: [],
                        isFuel: false,
                        startKm: '',
                        endKm: '',
                        fuelAmount: ''
                    };

                    state.exp.push(newExp);
                    state.quickExpOpen = false;
                    state.quickExp = { trip: '', cat, amt: '', cur, payer: '' };
                    save();
                    renderApp();
                    return;
                }
                if (act === 'cancel') {
                    state.view = 'list';
                    state.err = '';
                    renderApp();
                }

                if (act === 'cancel') {
                    state.view = 'list';
                    state.err = '';
                    renderApp();
                }

                if (act === 'new-res') {
                    state.modals.resForm = true;
                    state.resForm = getEmptyResForm();
                    // Rezervasyon formu açılırken listeyi kapat (Daha temiz UI)
                    state.helpersAccordion.reservations = false;
                    if (state.tripFilter) state.resForm.trip = state.tripFilter;
                    renderApp();
                }

                // YENİ: Seyahat Yönetimi popup'ından yeni seyahat ekleme
                if (act === 'new-trip') {
                    state.tripForm = getEmptyTripForm();
                    state.modals.tripForm = true;
                    // window.location.hash = '#'; // Helper menüyü KAPATMA (Scroll pozisyonunu koru)
                    renderApp();
                }

                if (act === 'cancel-trip') {
                    state.modals.tripForm = false;
                    if (state.tripFilter) state.resForm.trip = state.tripFilter;
                    state.modals.resForm = true;
                    state.err = '';
                    renderApp();
                }

                if (act === 'save-trip') {
                    const name = (document.getElementById('i-trip-name').value || '').trim();
                    if (!name) { alert('Seyahat adı zorunludur.'); return; }

                    const start = document.getElementById('i-trip-start').value;
                    const end = document.getElementById('i-trip-end').value;
                    const persons = document.getElementById('i-trip-persons').value;

                    // DUPLICATE CHECK
                    const isDuplicate = state.trips.some(t =>
                        t.name.toLowerCase() === name.toLowerCase() && t.id !== state.tripForm.id
                    );

                    if (isDuplicate) {
                        alert('Bu isimde başka bir seyahat zaten var. Lütfen farklı bir isim seçin.');
                        return;
                    }

                    if (state.tripForm.id) {
                        // EDIT
                        const tripId = state.tripForm.id;
                        const oldName = state.tripForm.name;

                        state.trips = state.trips.map(t => {
                            if (t.id === tripId) {
                                return { ...t, name: titleCase(name), startDate: start, endDate: end, persons: persons };
                            }
                            return t;
                        });

                        const newName = titleCase(name);
                        if (oldName !== newName) {
                            if (confirm(`Seyahat adı "${oldName}" -> "${newName}" olarak değiştirildi. İlişkili tüm harcama ve rezervasyon kayıtları da güncellensin mi?`)) {
                                state.exp = state.exp.map(x => x.trip === oldName ? { ...x, trip: newName } : x);
                                state.res = state.res.map(r => r.trip === oldName ? { ...r, trip: newName } : r);
                                state.criticalNotes = state.criticalNotes.map(n => n.trip === oldName ? { ...n, trip: newName } : n);
                            }
                        }

                    } else {
                        // NEW
                        const newTrip = {
                            id: genId(),
                            name: titleCase(name),
                            startDate: start,
                            endDate: end,
                            persons: persons
                        };
                        state.trips.push(newTrip);
                        if (state.view === 'form') {
                            state.form.trip = newTrip.name;
                        }
                    }

                    state.modals.tripForm = false;
                    save();
                    renderApp();
                }

                if (act === 'del-trip') {
                    e.preventDefault();
                    e.stopPropagation();

                    try {
                        // FIX: Type mismatch prevention (String vs Number)
                        const tripIdToDelete = String(id);
                        const tripToDelete = state.trips.find(t => String(t.id) === tripIdToDelete);

                        if (!tripToDelete) {
                            console.warn('Silinecek seyahat bulunamadı:', tripIdToDelete);
                            return;
                        }

                        const tripName = tripToDelete.name;

                        // İlişkili kayıtları say
                        const relatedExpCount = state.exp.filter(x => x.trip === tripName).length;
                        const relatedResCount = state.res.filter(r => r.trip === tripName).length;
                        const relatedNotesCount = state.criticalNotes.filter(n => n.trip === tripName).length;

                        const relatedTransferCount = (state.transfers || []).filter(t => t.trip === tripName).length;
                        let warningMsg = `"${tripName}" seyahatini silmek istediğinize emin misiniz?\n\n`;
                        if (relatedExpCount > 0 || relatedResCount > 0 || relatedNotesCount > 0 || relatedTransferCount > 0) {
                            warningMsg += `⚠️ DİKKAT: Bu işlem ile birlikte aşağıdaki kayıtlar da SİLİNECEK:\n`;
                            if (relatedExpCount > 0) warningMsg += `• ${relatedExpCount} harcama kaydı\n`;
                            if (relatedResCount > 0) warningMsg += `• ${relatedResCount} rezervasyon\n`;
                            if (relatedNotesCount > 0) warningMsg += `• ${relatedNotesCount} not\n`;
                            if (relatedTransferCount > 0) warningMsg += `• ${relatedTransferCount} mahsuplaşma/transfer
`;
                            warningMsg += `\nBu işlem geri alınamaz!`;
                        }

                        if (confirm(warningMsg)) {
                            const deletedTrip = state.trips.find(t => String(t.id) === tripIdToDelete);
                            const removedExp = state.exp.filter(x => x.trip === tripName);
                            const removedRes = state.res.filter(r => r.trip === tripName);
                            const removedNotes = state.criticalNotes.filter(n => n.trip === tripName);
                            const removedTransfers = (state.transfers || []).filter(t => t.trip === tripName);
                            if (deletedTrip) setUndo({ kind: 'trip', trip: deletedTrip, exp: removedExp, res: removedRes, notes: removedNotes, message: `Seyahat silindi: ${tripName}. (Geri alınabilir)` });

state.trips = state.trips.filter(t => String(t.id) !== tripIdToDelete);
                            state.exp = state.exp.filter(x => x.trip !== tripName);
                            state.res = state.res.filter(r => r.trip !== tripName);
                            state.criticalNotes = state.criticalNotes.filter(n => n.trip !== tripName);

                            state.modals.tripForm = false;
                            save();
                            renderApp();
                            setTimeout(() => { window.location.hash = 'helper-trips'; }, 50);
                        }
                    } catch (err) {
                        console.error('Seyahat silme hatası:', err);
                        alert('Seyahat silinirken bir hata oluştu.');
                    }
                    return;
                }
                if (act === 'cancel-res') {
                    state.modals.resForm = false;
                    state.err = '';
                    state.tab = 'other';
                    // Tüm accordion'ları kapat, sadece reservations'u aç
                    state.helpersAccordion = {
                        critical: false,
                        places: false,
                        health: false,
                        transport: false,
                        flightCheck: false,
                        route: false,
                        report: false,
                        data: false,
                        reservations: true
                    };
                    renderApp();
                    setTimeout(() => {
                        const el = document.getElementById('helper-reservations');
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                }

                // Not İşlemleri
                if (act === 'add-note') {
                    const noteInput = document.getElementById('new-note-input-other') || document.getElementById('new-note-input');
                    const noteText = noteInput ? noteInput.value.trim() : state.newCriticalNote.trim();

                    if (noteText) {
                        state.criticalNotes.push({
                            id: genId(),
                            trip: state.selectedNoteTrip,
                            note: noteText,
                        });
                        state.newCriticalNote = '';
                        if (noteInput) noteInput.value = '';
                        save();
                        renderApp();
                    }
                }
                if (act === 'del-note') {
                    e.stopPropagation(); // Güvenlik: Tıklama yayılımını durdur
                    e.preventDefault(); // Varsayılan davranışı engelle
                    const deleted = state.criticalNotes.find(n => n.id === id);
                    if (deleted) setUndo({ kind: 'note', item: deleted, message: 'Not silindi. (Geri alınabilir)' });
                    state.criticalNotes = state.criticalNotes.filter(n => n.id !== id);
                    save();
                    renderApp();
                }

                if (act === 'add-transfer') {
                    e.preventDefault();
                    e.stopPropagation();
                    const tripName = state.selectedReportTrip;
                    const fromEl = document.getElementById('trf-from');
                    const toEl = document.getElementById('trf-to');
                    const amtEl = document.getElementById('trf-amt');
                    const curEl = document.getElementById('trf-cur');
                    const dateEl = document.getElementById('trf-date');
                    const noteEl = document.getElementById('trf-note');

                    const from = fromEl ? String(fromEl.value || '').trim() : '';
                    const to = toEl ? String(toEl.value || '').trim() : '';
                    const amt = amtEl ? Number(String(amtEl.value || '').replace(',', '.')) : 0;
                    const cur = curEl ? String(curEl.value || '').trim() : (state.reportCurrency || state.baseCurrency || BASE_CURRENCY);
                    const date = dateEl ? String(dateEl.value || '').trim() : '';
                    const note = noteEl ? String(noteEl.value || '').trim() : '';

                    if (!tripName) return;
                    if (!from || !to || from === to) {
                        alert('Gönderen ve alan seçimi geçerli olmalı.');
                        return;
                    }
                    if (!(amt > 0)) {
                        alert('Transfer tutarı 0\'dan büyük olmalı.');
                        return;
                    }

                    if (!Array.isArray(state.transfers)) state.transfers = [];
                    state.transfers.push({
                        id: genId(),
                        trip: tripName,
                        from,
                        to,
                        amt,
                        cur,
                        date,
                        note
                    });

                    if (amtEl) amtEl.value = '';
                    if (noteEl) noteEl.value = '';
                    save();
                    renderApp();
                return;
                }

                if (act === 'del-transfer') {
                    e.preventDefault();
                    e.stopPropagation();
                    const deleted = (state.transfers || []).find(t => String(t.id) === String(id));
                    if (deleted) setUndo({ kind: 'transfer', item: deleted, message: 'Mahsuplaşma silindi. (Geri alınabilir)' });
                    state.transfers = (state.transfers || []).filter(t => String(t.id) !== String(id));
                    save();
                    renderApp();
                return;
                }

                if (act === 'clean-all-exp') {
                    e.preventDefault();
                    e.stopPropagation(); // Event yayılımını durdur (Gereksiz tıklamaları engeller)
                    if (confirm('DİKKAT! TÜM harcama kayıtları (Tüm seyahatler, tüm şehirler) kalıcı olarak silinecektir. Emin misiniz?')) {
                        state.exp = [];
                        save();
                        renderApp();
                    }
                    return; // İşlem tamamlandı
                }

                if (act === 'load-cloud') {
                    if (!currentUser) {
                        alert('Lütfen önce giriş yapın.');
                        openLoginModal();
                        return;
                    }
                    loadUserDataFromCloud();
                    alert('Bulut senkronizasyonu başlatıldı. Veriler yüklenince ekran güncellenecektir.');
                    return;
                }

                if (act === 'load-from-uid') {
                    const targetUid = prompt('Lütfen verilerinizin olduğu ESKİ UID bilgisini yapıştırın:');
                    if (targetUid && targetUid.trim()) {
                        isCloudLoading = true;
                        console.log('Manuel kurtarma başlatıldı, hedef UID:', targetUid.trim());
                        db.collection('users').doc(targetUid.trim()).get()
                            .then(snap => {
                                if (snap.exists) {
                                    const data = snap.data() || {};
                                    console.log('Kurtarılacak veri ham hali:', data);
                                    try {
                                        console.log('Eski yerel hafıza temizleniyor...');
                                        localStorage.clear(); // Hafızayı boşalt (Kota hatasını önlemek için)

                                        // Verileri tek tek kontrol ederek yükle
                                        if (data.exp) state.exp = data.exp;
                                        if (data.res) state.res = data.res;
                                        if (data.chk) state.chk = data.chk;
                                        if (data.criticalNotes) state.criticalNotes = data.criticalNotes;
                                        if (data.trips) state.trips = data.trips;
                                        if (data.transfers) state.transfers = data.transfers;
                                        if (data.baseCurrency) {
                                            state.baseCurrency = data.baseCurrency;
                                            state.reportCurrency = data.baseCurrency;
                                        }

                                        console.log('State güncellendi, kaydediliyor...');
                                        save(); // Localstorage
                                        
                                        console.log('Ekrana çiziliyor...');
                                        renderApp();
                                        
                                        alert('Veriler başarıyla kurtarıldı! Şimdi buluta yedekleniyor...');
                                        saveStateToCloud(); // Yeni UID'ye yedekle
                                    } catch (e) { 
                                        console.error('Kurtarma işlemi sırasında hata:', e); 
                                        alert('Veri işleme hatası: ' + e.message); 
                                    }
                                } else {
                                    alert('Bu UID ile eşleşen bir döküman bulunamadı. Lütfen UID\'yi doğru kopyaladığınızdan emin olun.');
                                }
                            })
                            .catch(err => {
                                console.error('Firebase erişim hatası:', err);
                                alert('Firebase Hatası: ' + err.message);
                            })
                            .finally(() => { isCloudLoading = false; });
                    }
                    return;
                }

                if (act === 'scan-trips') {
                    const distinctTrips = getDistinctTripsAll();
                    let addedCount = 0;
                    
                    distinctTrips.forEach(name => {
                        const exists = state.trips.some(t => t.name.toLowerCase() === name.toLowerCase());
                        if (!exists) {
                            state.trips.push({
                                id: genId(),
                                name: titleCase(name),
                                startDate: new Date().toISOString().split('T')[0],
                                endDate: '',
                                persons: ''
                            });
                            addedCount++;
                        }
                    });
                    
                    if (addedCount > 0) {
                        alert(`${addedCount} adet eksik seyahat bulundu ve listeye eklendi.`);
                        save();
                        renderApp();
                    } else {
                        alert('Eksik seyahat bulunamadı. Tüm harcamalarınız zaten kayıtlı seyahatler ile ilişkili.');
                    }
                    return;
                }

                // SEYAHAT YÖNETİMİ AKSİYONLARI
                if (act === 'open-trip-mgmt') {
                    state.helpersAccordion.trips = true;
                    renderApp();
                    return;
                }
                if (act === 'complete-trip') {
                    const trip = state.trips.find(t => t.id === id);
                    if (trip && confirm(`"${trip.name}" seyahatini tamamlamak istiyor musunuz? Bu işlem kurları şu anki değerlerinde donduracaktır.`)) {
                        trip.status = 'completed';
                        trip.lockedRates = JSON.parse(JSON.stringify(EXCHANGE_RATES));
                        save(); renderApp();
                    }
                    return;
                }
                if (act === 'reopen-trip') {
                    const trip = state.trips.find(t => t.id === id);
                    if (trip && confirm(`"${trip.name}" seyahatini tekrar açmak istiyor musunuz? Harcamalar tekrar güncel kurlar üzerinden hesaplanacaktır.`)) {
                        trip.status = 'active';
                        trip.lockedRates = null;
                        save(); renderApp();
                    }
                    return;
                }

                if (act === 'edit-trip-detail') {
                    const tripToEdit = state.trips.find(t => t.id === id);
                    if (tripToEdit) {
                        state.tripForm = { ...tripToEdit }; // Formu doldur
                        state.modals.tripForm = true;
                        // Modal hash'ini temizle ki overlay düzgün görünsün (opsiyonel)
                        window.location.hash = '';
                        renderApp();
                    }
                }

                // KRİTİK: DETAY MODALINDAN TEK HARCAMAYI SİLME
                if (act === 'del-exp-detail') {
                    e.preventDefault();
                    e.stopPropagation();
                    try {
                        if (state.selExp && confirm('Bu harcama kaydı kalıcı olarak silinsin mi?')) {
                            const idToDelete = String(state.selExp);
                            const deleted = state.exp.find(x => String(x.id) === idToDelete);
                            if (deleted) setUndo({ kind: 'exp', item: deleted, message: 'Harcama silindi. (Geri alınabilir)' });
                            state.exp = state.exp.filter(x => String(x.id) !== idToDelete);
                            state.modals.detail = false;
                            save();
                            renderApp();
                        }
                    } catch (err) {
                        console.error('Harcama silme hatası:', err);
                    }
                    return;
                }

                // KRİTİK: ŞEHİR BAŞLIĞINDAN TÜM ŞEHİR HARCAMALARINI SİLME
                if (act === 'del-city') {
                    e.stopPropagation();
                    e.preventDefault();
                    const cityToDelete = val;
                    if (confirm(`"${cityToDelete}" şehrine ait TÜM harcama kayıtları kalıcı olarak silinecek. Emin misiniz?`)) {
                        state.exp = state.exp.filter(x => x.city !== cityToDelete);
                        delete state.expandedCities[cityToDelete];
                        save();
                        renderApp();
                    }
                    return; // İşlem tamamlandı
                }

                // Checklist İşlemleri
                if (act === 'reset-chk') {
                    e.preventDefault();
                    e.stopPropagation();
                    if (confirm('Mevcut liste SİLİNECEK ve varsayılan listeye dönülecek. Onaylıyor musun?')) {
                        state.chk.items = DEF_ITEMS.map(i => ({ id: genId(), cat: i.cat, val: i.val, done: false, date: i.date || '' }));
                        state.chk.cats = [...DEF_CATS];
                        state.openChkCats = {}; state.chk.cats.forEach(x => state.openChkCats[x.id] = false);
                        save(); renderApp();
                    }
                    return;
                }

                // KRİTİK: CHECK LIST MADDE SİLME
                if (act === 'del-chk') {
                    e.stopPropagation();
                    e.preventDefault();
                    try {
                        if (id && confirm('Bu maddeyi listeden kaldırmak istediğinize emin misiniz?')) {
                            const idStr = String(id);
                            const deleted = state.chk.items.find(x => String(x.id) === idStr);
                            if (deleted) setUndo({ kind: 'chk-item', item: deleted, message: 'Liste maddesi silindi. (Geri alınabilir)' });
                            state.chk.items = state.chk.items.filter(x => String(x.id) !== idStr);
                            save(); renderApp();
                        }
                    } catch (err) { console.error(err); }
                    return;
                }

                if (act === 'add-chk-single') {
                    const catId = t.dataset.catId;
                    const itemInput = document.getElementById(`new-chk-item-${catId}`);
                    const dateInput = document.getElementById(`new-chk-date-${catId}`); // Tarih inputunu yakala

                    const rawItems = itemInput ? itemInput.value : '';
                    const itemDate = dateInput ? dateInput.value : ''; // Tarihi al

                    if (rawItems && catId) {
                        rawItems.split(',').forEach(part => {
                            const clean = part.trim();
                            if (clean) state.chk.items.push({ id: genId(), cat: catId, val: clean, done: false, date: itemDate }); // Tarihi kaydet
                        });
                        if (itemInput) itemInput.value = '';
                        if (dateInput) dateInput.value = ''; // Tarih alanını temizle
                        save(); renderApp();
                    } else {
                        state.err = 'Lütfen bir madde adı girin.';
                        renderApp();
                    }
                }

                if (act === 'tog-chk-cat') {
                    // del-chk-cat-confirm butonuna basıldığında toggle'ı engelle
                    if (e.target.closest('[data-act="del-chk-cat-confirm"]')) return;
                    state.openChkCats[val] = !state.openChkCats[val];
                    renderApp();
                }

                if (act === 'add-cat') {
                    const nameInput = document.getElementById('new-cat-name');
                    const iconInput = document.getElementById('new-cat-icon');
                    const name = nameInput.value.trim();
                    const icon = iconInput.value.trim() || '📦';
                    if (name) {
                        const newId = 'c' + genId().slice(0, 8);
                        const newCat = { id: newId, l: name, i: icon };
                        state.chk.cats.push(newCat);
                        state.openChkCats[newId] = true;
                        nameInput.value = '';
                        iconInput.value = '';
                        save(); renderApp();
                    } else {
                        state.err = 'Lütfen bir kategori adı girin.';
                        renderApp();
                    }
                }

                if (act === 'del-chk-cat-confirm') {
                    e.preventDefault();
                    e.stopPropagation();
                    try {
                        if (id && confirm('Bu kategori ve İÇİNDEKİ TÜM MADDELER silinecek. Onaylıyor musun?')) {
                            const catId = String(id);
                            const deletedCat = state.chk.cats.find(c => String(c.id) === catId);
                            const deletedItems = state.chk.items.filter(i => String(i.cat) === catId);
                            if (deletedCat) setUndo({ kind: 'chk-cat', cat: deletedCat, items: deletedItems, message: 'Kategori silindi. (Geri alınabilir)' });
                            state.chk.cats = state.chk.cats.filter(c => String(c.id) !== catId);
                            state.chk.items = state.chk.items.filter(i => String(i.cat) !== catId);
                            delete state.openChkCats[catId];
                            save();
                            renderApp();
                        }
                    } catch (err) { console.error(err); }
                    return;
                }

                // Harcama Formu İşlemleri
                if (act === 'set-cat') {
                    // KRİTİK: Kategori değişmeden önce mevcut input değerlerini state'e aktar
                    const iTrip = document.getElementById('i-trip');
                    const iCity = document.getElementById('i-city');
                    const iPlace = document.getElementById('i-place');
                    const iAmt = document.getElementById('i-amt');
                    const iDesc = document.getElementById('i-desc');
                    const iDate = document.getElementById('i-date');
                    const iType = document.getElementById('i-type');
                    const iCur = document.getElementById('i-cur');
                    const iPpl = document.getElementById('i-ppl');

                    if (iTrip) state.form.trip = iTrip.value;
                    if (iCity) state.form.city = iCity.value;
                    if (iPlace) state.form.place = iPlace.value;
                    if (iAmt) state.form.amt = iAmt.value.replace(',', '.').replace(/[^0-9.]/g, '');
                    if (iDesc) state.form.desc = iDesc.value;
                    if (iDate) state.form.date = iDate.value;
                    if (iType) state.form.type = iType.value;
                    if (iCur) state.form.cur = iCur.value;
                    if (iPpl) state.form.ppl = iPpl.value;

                    state.form.cat = val;
                    const isFuelSelected = (val === 'fuel');
                    state.form.isFuel = isFuelSelected;

                    if (isFuelSelected) {
                        if (!state.form.place) state.form.place = 'Akaryakıt İstasyonu';
                    } else {
                        state.form.startKm = '';
                        state.form.endKm = '';
                        state.form.fuelAmount = '';
                    }
                    renderApp();
                }

                if (act === 'del-img') {
                    e.stopPropagation(); // Güvenlik: Tıklama yayılımını durdur
                    e.preventDefault(); // KRİTİK DÜZELTME: Varsayılan davranışı engelle
                    const idx = Number(val);
                    const deleted = state.form.imgs[idx];
                    if (!Number.isNaN(idx) && deleted) setUndo({ kind: 'img', index: idx, data: deleted, message: 'Fotoğraf kaldırıldı. (Geri alınabilir)' });
                    state.form.imgs.splice(idx, 1);
                    renderApp();
                }

                if (act === 'save') {
                    const f = state.form;

                    const isIndividualInput = document.getElementById('i-isIndividual');
                    f.isIndividual = isIndividualInput ? isIndividualInput.checked : false;

                    // Payer bilgisini al
                    const payerInput = document.getElementById('i-payer');
                    f.payer = (payerInput && !f.isIndividual) ? payerInput.value : '';

                    const settledInput = document.getElementById('i-isSettled');
                    f.isSettled = (!f.isIndividual && settledInput) ? !!settledInput.checked : false;

                    const isFuelActive = f.cat === 'fuel';
                    f.isFuel = isFuelActive;

                    if (!f.city || !f.place || !f.amt || !f.cat) {
                        state.err = 'Zorunlu alanları doldurunuz (Şehir, Mekan, Tutar, Kategori).';
                        renderApp();
                        return;
                    }

                    // YENİ VALIDASYON: Ortak harcamalarda payer zorunlu
                    if (!f.isIndividual && f.trip) {
                        const tripObj = state.trips.find(t => t.name === f.trip);
                        if (tripObj && tripObj.persons && !f.payer) {
                            state.err = 'Ortak harcamalarda "Ödeyen" alanı zorunludur. Lütfen ödemeyi yapan kişiyi seçin.';
                            renderApp();
                            return;
                        }
                    }

                    if (isFuelActive && (!f.startKm || !f.endKm || !f.fuelAmount)) {
                        state.err = 'Yakıt harcaması için Başlangıç Km, Bitiş Km ve Yakıt Miktarı alanları zorunludur.';
                        renderApp();
                        return;
                    }


                    // Misafir kullanıcı için seyahat ve harcama limitleri
                    if (isGuest()) {
                        const newTripName = titleCase(f.trip || '');
                        const isNewRecord = !f.id;

                        // 1) En fazla 2 seyahat
                        if (isNewRecord && guestTripLimitExceeded(newTripName)) {
                            state.err = 'Giriş yapmadan en fazla 2 seyahat ekleyebilirsiniz. Lütfen giriş yapın veya mevcut seyahatlerden birini kullanın.';
                            openLoginModal('En fazla 2 seyahat eklemek için giriş yapmanız gerekir.');
                            renderApp();
                            return;
                        }

                        // 2) Bir seyahat için en fazla 3 harcama
                        if (isNewRecord && newTripName && guestExpenseLimitExceeded(newTripName)) {
                            state.err = 'Giriş yapmadan bir seyahat için en fazla 3 harcama ekleyebilirsiniz. Lütfen giriş yapın.';
                            openLoginModal('Bir seyahat için 3\'ten fazla harcama eklemek için giriş yapmanız gerekir.');
                            renderApp();
                            return;
                        }
                    }

                    const rec = { ...f, id: f.id || genId(), city: titleCase(f.city), place: titleCase(f.place), trip: titleCase(f.trip) };

                    if (isFuelActive) {
                        rec.startKm = String(rec.startKm).replace(/[^0-9]/g, '');
                        rec.endKm = String(rec.endKm).replace(/[^0-9]/g, '');
                        rec.fuelAmount = String(rec.fuelAmount).replace(/[^0-9.]/g, '');

                        if (Number(rec.endKm) < Number(rec.startKm)) {
                            state.err = 'Bitiş Kilometresi, Başlangıç Kilometresinden küçük olamaz.';
                            renderApp();
                            return;
                        }
                    } else {
                        rec.startKm = '';
                        rec.endKm = '';
                        rec.fuelAmount = '';
                    }

                    rec.place = titleCase(f.place);

if (act === 'export-pdf') {

                    const reportCur = state.reportCurrency || state.baseCurrency || BASE_CURRENCY;
                    const scope = state.indFilter || 'all';

                    // 2) Bu seyahate ait harcamaları al (mevcut helper)
                    const allExpenses = getTripExpenses(selectedTrip) || [];

                    // Bireysel / Ortak filtresini uygula + (YENİ) PDF kategori filtresi
                    const pdfCat = (state.reportPdfCat || '').trim();
                    const normCat = (v) => String(v || '').trim();

                    const filteredExpenses = allExpenses.filter(x => {
                        if (scope === 'individual' && x.isIndividual !== true) return false;
                        if (scope === 'shared' && x.isIndividual !== false) return false;

                        if (pdfCat) {
                            const c = normCat(x.cat);
                            if (pdfCat === '__uncat__') {
                                if (c) return false;

                                if (c !== pdfCat) return false;
                            }
                        }
                        return true;
                    });

                    // 3) Bu seyahate ait rezervasyonları al
                    const allReservations = (state.res || []).filter(r => {
                        if (!r.trip || r.trip !== selectedTrip) return false;
                        if (isNaN(Number(r.cost)) || Number(r.cost) <= 0) return false;
                        return true;
                    });

                    const filteredReservations = allReservations.filter(r => {
                        if (scope === 'individual' && r.isIndividual !== true) return false;
                        if (scope === 'shared' && r.isIndividual !== false) return false;
                        return true;
                    });

                    // 4) Tarih aralığı çıkar (min/max tarih)
                    const allDates = [];
                    filteredExpenses.forEach(x => { if (x.date) allDates.push(x.date); });
                    filteredReservations.forEach(r => {
                        if (r.startDate) allDates.push(r.startDate);
                        if (r.endDate) allDates.push(r.endDate);
                    });
                    allDates.sort();
                    const dateFrom = allDates[0] || '';
                    const dateTo = allDates[allDates.length - 1] || '';

                    // 5) Özet tutarları rapor para biriminde hesapla
                    let totalExpReport = 0;
                    filteredExpenses.forEach(x => {

                        totalExpReport += convertToBase(amt, cur, reportCur, state.selectedReportTrip);
                    });

                    let totalResReport = 0;

                    });

                    const totalReport = totalExpReport + totalResReport;

                    // Gün sayısı (ortalama için)
                    let dayCount = 0;
                    if (dateFrom && dateTo) {
                        const d1 = new Date(dateFrom);
                        const d2 = new Date(dateTo);
                        const diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
                        if (diff > 0) dayCount = diff;
                    }
                    const dailyAvg = dayCount > 0 ? totalReport / dayCount : 0;

                    // Bireysel/ortak alt özet
                    let indivTotal = 0;

                    filteredExpenses.forEach(x => {

                        if (x.isIndividual) indivTotal += amt; else sharedTotal += amt;
                    });
                    filteredReservations.forEach(r => {

                        // Kullanıcı isteği: "Ödendi... genel hesaba eklensin fakat alacak-verecek hesabına dahil olmasın."
                        // Burada "sharedTotal" ve "indivTotal" raporun alt özeti.
                        // Settled olsa bile harcama yapılmıştır. Shared total'e eklenebilir.
                        const amt = convertToBase(Number(r.cost) || 0, r.cur || reportCur, reportCur, state.selectedReportTrip);
                        if (r.isIndividual) indivTotal += amt; else sharedTotal += amt;
                    });

                    // Gün Sayısı Hesabı (Seyahat Tarihlerine Göre)
                    let finalDayCount = dayCount; // Harcamalardan gelen count fallback
                    const tripObj = state.trips.find(t => t.name === selectedTrip);

                        const d1 = new Date(tripObj.startDate);
                        const d2 = new Date(tripObj.endDate);
                        const diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
                        if (diff > 0) finalDayCount = diff;
                    }
                    const finalDailyAvg = finalDayCount > 0 ? totalReport / finalDayCount : 0;

                    // BORÇ HESAPLAMA (YENİ - PDF için)
                    const debtInfo = calculateDebts(selectedTrip);

                                        // YENİ: Harcamaları giriş (ekleme) sırasına göre değil, harcama ekranında belirtilen TARİH alanına göre sırala
                    const expenseDateMs = (x) => {
                        const d = (x && x.date ? String(x.date).trim() : '');
                        if (!d) return Number.POSITIVE_INFINITY;
                        const ms = Date.parse(d);
                        return Number.isFinite(ms) ? ms : Number.POSITIVE_INFINITY;
                    };
                    const sortedExpenses = [...filteredExpenses].sort((a, b) => {
                        const da = expenseDateMs(a);
                        const db = expenseDateMs(b);
                        if (da !== db) return da - db;
                        // Aynı tarih ise stabil sıralama için id fallback
                        const ia = (a && a.id != null) ? String(a.id) : '';
                        const ib = (b && b.id != null) ? String(b.id) : '';
                        return ia.localeCompare(ib);
                    });

// 6) Payload hazırla
                    const payload = {

                        },

                        })),
                        reservations: filteredReservations.map(r => ({

                            isSettled: !!r.isSettled
                        })),
                    };

                    // 7) HTML raporu oluştur ve yeni sekmede aç
                    const html = buildReportHtml(payload);

                    const windowName = `pdf_report_${Date.now()}`;
                    const w = window.open(url, windowName);

}

                if (act === 'copy-json') {

                if (act === 'download-json') {

                        const blob = new Blob([txt], { type: 'application/json;charset=utf-8' });

                        a.click();

                        setTimeout(() => URL.revokeObjectURL(url), 10_000);

                if (act === 'pick-json-file') {

                    e.stopPropagation();

                }

                if (act === 'undo') {
                    e.preventDefault();
                    e.stopPropagation();
                    performUndo();
                    return;
                }

});

            document.addEventListener('change', e => {
                const t = e.target;


                if (t.dataset.act === 'io-file') {
                    try {
                        const file = t.files && t.files[0];

                    const files = t.files;
                    const currentCount = state.form.imgs.length;
                    const newFiles = Array.from(files).slice(0, MAX_IMAGES - currentCount);

                    if (newFiles.length === 0 && files.length > 0) {
                        setState({ err: `Maksimum ${MAX_IMAGES} fotoğraf ekleme limitine ulaşıldı.` });
                        t.value = '';
                        return;
                    }

                    if (newFiles.length > 0) {

                        setState({ err: 'Resimler işleniyor ve optimize ediliyor... Lütfen bekleyiniz.' });

                        const errorMessages = [];

                        const readerPromises = newFiles.map(file => {
                            return resizeAndConvertImage(file)
                                .catch(error => {
                                    errorMessages.push(`Hata (${file.name}): ${error.message}`);
                                    return null;
                                });
                        });

                        Promise.all(readerPromises)
                            .then(processedImages => {
                                const validImages = processedImages.filter(img => img !== null);

                                if (validImages.length > 0) {
                                    const updatedImgs = [...state.form.imgs, ...validImages];
                                    state.form.imgs = updatedImgs.slice(0, MAX_IMAGES);
                                }

                                let finalError = '';
                                if (errorMessages.length > 0) {
                                    finalError = `Yükleme Hataları (${errorMessages.length} dosya): ${errorMessages.join(' | ')}`;
                                } else if (validImages.length === 0 && files.length > 0) {
                                    finalError = 'Hiç resim yüklenemedi (Desteklenmeyen dosya formatı veya bilinmeyen hata).';
                                } else {
                                    finalError = '';
                                }

                                t.value = '';
                                setState({ err: finalError });

                            })
                            .catch(error => {
                                console.error("Resim işlenirken beklenmeyen genel genel hata oluştu:", error);
                                state.err = "Resim yüklenirken beklenmeyen genel bir hata oluştu.";
                                t.value = '';
                                renderApp();
                            });
                    } else {
                        t.value = '';
                    }
                }
            });

            document.addEventListener('input', e => {
                const t = e.target;

                if (t.dataset.act === 'search') {
                    // Eski input içeriği ve imleç pozisyonu
                    const input = t;
                    const value = input.value;
                    const caret = input.selectionStart ?? value.length;

                    // Arama state'ini güncelle
                    state.search = value;

                    // Uygulamayı yeniden çiz
                    renderApp();

                    // Yeniden çizilen DOM'da arama kutusunu tekrar bul
                    const newInput = document.querySelector('input[data-act="search"]');
                    if (newInput) {
                        // Tekrar odak ver
                        newInput.focus();
                        // İmleci eski pozisyona getir (try/catch: bazı tarayıcılarda hata atmaması için)
                        try {
                            newInput.setSelectionRange(caret, caret);
                        } catch (e) { }
                    }

                    // Bu event burada bitti
                    return;
                }



                if (t.dataset.act === 'update-new-note') {
                    state.newCriticalNote = t.value;
                    return;
                }

                // Harcama formu inputları
                if (t.closest('.form-modal-overlay') && !t.closest('[data-act="save-res"]')) { // Sadece harcama formu alanları
                    const fExp = state.form;
                    let shouldRender = false;

                    switch (t.id) {
                        case 'i-trip':
                            fExp.trip = t.value;
                            // Seyahat değişince, o seyahatte tek bir para birimi varsa varsayılanı ona çek
                            (function () {
                                const tripName = (t.value || '').trim();
                                if (tripName) {
                                    const tripExps = state.exp.filter(x => (x.trip || '') === tripName && x.cur);
                                    const tripCurrencies = [...new Set(tripExps.map(x => x.cur || BASE_CURRENCY))];
                                    if (tripCurrencies.length === 1) {
                                        fExp.cur = tripCurrencies[0];
                                        shouldRender = true;
                                    }
                                }
                            })();
                            break;
                        case 'i-city': fExp.city = t.value; break;
                        case 'i-place': fExp.place = t.value; break;
                        case 'i-amt':
                            fExp.amt = t.value.replace(',', '.').replace(/[^0-9.]/g, '');
                            break;
                        case 'i-cur': fExp.cur = t.value; shouldRender = true; break;
                        case 'i-ppl': fExp.ppl = t.value; break;
                        case 'i-date': fExp.date = t.value; shouldRender = true; break;
                        case 'i-type': fExp.type = t.value; break;
                        case 'i-desc': fExp.desc = t.value; break;
                        case 'i-start-km': fExp.startKm = t.value.replace(/[^0-9]/g, ''); break;
                        case 'i-end-km': fExp.endKm = t.value.replace(/[^0-9]/g, ''); break;
                        case 'i-fuel-amount':
                            fExp.fuelAmount = t.value.replace(',', '.').replace(/[^0-9.]/g, '');
                            break;
                        default: return;
                    }

                    if (shouldRender) {
                        renderApp();
                    }
                }

                // Rezervasyon formu inputları ARTİK BURADA DEĞİL. SAVE ANINDA DOM'DAN OKUNUYOR.
                if (state.modals.resForm) {
                    const fRes = state.resForm;
                    let shouldRender = false;

                    switch (t.id) {
                        case 'i-res-name': fRes.name = t.value; break;
                        case 'i-res-trip': fRes.trip = t.value; break;
                        case 'i-res-location': fRes.location = t.value; break;
                        case 'i-res-code': fRes.code = t.value; break;
                        case 'i-res-cost': fRes.cost = t.value.replace(',', '.').replace(/[^0-9.]/g, ''); break;
                        case 'i-res-notes': fRes.notes = t.value; break;
                        // Tarih ve Kur alanı input'tan renderApp() çağırmalı ki güncel değerler formda görünsün
                        case 'i-res-start-date': fRes.startDate = t.value; shouldRender = true; break;
                        case 'i-res-end-date': fRes.endDate = t.value; shouldRender = true; break;
                        case 'i-res-cur': fRes.cur = t.value; shouldRender = true; break;
                        default: return;
                    }

                    if (shouldRender) {
                        renderApp();
                    }
                }
            });

            // Saati her saniye güncelleyen ana fonksiyon
            const updateClock = () => {
                const timeElement = document.getElementById('local-time');
                if (timeElement) {
                    const { time } = formatTime(state.targetTimezone);
                    state.currentTime = time;
                    timeElement.textContent = time;
                }
            };

            const startClock = () => {
                updateClock();
                timeInterval = setInterval(updateClock, 1000);
            };

            window.onload = function () {
                try {
                    initFirebaseAuth();
                    initState();
                    renderApp(); // İlk ekran, kur beklemeden çizilsin
                    // Konumu otomatik iste
                    if (typeof handleGeolocation === 'function') {
                        handleGeolocation();
                    }
                    fetchAndApplyRates().then(() => {
                        startClock();
                    });
                    
                } catch (e) {
                    console.error(e);
                    const root = document.getElementById('app-root');
                    if (root) {
                        const msg = (e && e.message) ? e.message : String(e || 'Bilinmeyen hata');
                        root.innerHTML = '<div class="p-4 text-sm text-red-300 bg-slate-900">Uygulama başlatılırken hata oluştu: ' + msg + '</div>';
                    }
                }
            };

            window.onbeforeunload = function () {
                if (timeInterval) clearInterval(timeInterval);
            };

        })();
    </script>
</body>

</html>
