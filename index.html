<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>TripLedger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="./app-icon.png">
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body class="min-h-screen bg-[#0F111A] text-slate-200 flex justify-center p-4 selection:bg-blue-500/30">

    <!-- Login modal -->
    <div id="auth-login-modal"
        class="fixed inset-0 z-[300] flex items-center justify-center bg-slate-950/80 backdrop-blur-md">
        <div class="relative w-full max-w-[400px] mx-4 overflow-hidden rounded-[2.5rem] bg-slate-900 border border-slate-800 shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-8 sm:p-10">
            <!-- Arka Plan Süslemeleri -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-600/20 blur-[80px] rounded-full"></div>
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-600/20 blur-[80px] rounded-full"></div>
            
            <!-- Kapatma Butonu -->
            <button data-act="auth-close" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-full bg-slate-800/50 text-slate-400 hover:text-white hover:bg-slate-700 transition-all z-10">
                ✕
            </button>

            <!-- İçerik -->
            <div class="relative z-10">
                <div class="mb-8 text-center">
                    <div class="inline-flex w-16 h-16 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/20 mb-4 rotate-3">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">Hoş Geldiniz</h2>
                    <p id="auth-login-message" class="mt-2 text-sm text-slate-400 leading-relaxed px-2">
                        Tüm seyahat verilerinizi bulutta güvenle saklamak için giriş yapın.
                    </p>
                </div>

                <div class="space-y-4">
                    <!-- Google Login -->
                    <button type="button" data-act="auth-google"
                        class="group w-full flex items-center justify-center gap-3 px-4 py-3.5 rounded-2xl bg-white text-slate-900 text-sm font-bold hover:bg-slate-100 transition-all duration-300 transform active:scale-[0.98]">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google ile Giriş Yap
                    </button>

                    <div class="relative py-2">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
                        <div class="relative flex justify-center text-[10px] uppercase tracking-widest"><span class="bg-slate-900 px-3 text-slate-500 font-bold">veya</span></div>
                    </div>

                    <!-- Email Login -->
                    <div class="space-y-3">
                        <div class="relative">
                            <span class="absolute left-4 top-4 text-slate-500 text-xs">@</span>
                            <input id="auth-email-input" type="email" placeholder="E-posta Adresiniz"
                                class="w-full pl-10 pr-4 py-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-sm text-white placeholder-slate-500 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all" />
                        </div>
                        <div class="relative">
                            <span class="absolute left-4 top-4 text-slate-500">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                            </span>
                            <input id="auth-password-input" type="password" placeholder="Şifreniz"
                                class="w-full pl-10 pr-4 py-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-sm text-white placeholder-slate-500 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all" />
                        </div>
                        
                        <div class="flex gap-3 pt-2">
                            <button type="button" data-act="auth-email-login"
                                class="flex-[2] py-4 rounded-2xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-500 shadow-lg shadow-indigo-600/20 transition-all transform active:scale-[0.98]">
                                Giriş Yap
                            </button>
                            <button type="button" data-act="auth-email-register"
                                class="flex-1 py-4 rounded-2xl bg-slate-800 text-slate-300 text-sm font-bold border border-slate-700 hover:bg-slate-700 transition-all transform active:scale-[0.98]">
                                Kayıt Ol
                            </button>
                        </div>
                    </div>

                    <!-- Logout Button -->
                    <button type="button" id="auth-logout-btn" data-act="auth-logout"
                        class="mt-4 w-full flex items-center justify-center gap-2 py-3.5 rounded-2xl border border-red-500/30 text-red-400 text-xs font-bold hover:bg-red-500/10 transition-all hidden">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Oturumu Kapat
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-root" class="w-full max-w-xl md:max-w-2xl"></div>

    <script src="app.js"></script>
</body>

</html>
