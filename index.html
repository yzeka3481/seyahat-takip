<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>TripLedger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="./app-icon.png">
    <style>
        /* --- PROFESYONEL VE TEMİZ STİLLER --- */
        body {
            font-family: 'Inter', sans-serif
        }

        /* KRİTİK DÜZELTME: Sayfa kaymasını kesinlikle engeller */
        html,
        body {
            overflow-x: hidden !important;
            width: 100%;
            max-width: 100vw;
            height: 100%;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        input, textarea, select { user-select: text; -webkit-user-select: text; }

        #app-root {
            width: 100%;
            max-width: 100%;
        }

        /* Scrollbar */
        .scrl::-webkit-scrollbar {
            width: 6px;
            height: 6px
        }

        .scrl::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.5);
            border-radius: 99px
        }

        .scrl::-webkit-scrollbar-track {
            background: transparent
        }

        /* Checkbox custom style (Daha az parlak, daha mat yeşil) */
        .custom-checkbox:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg>");
            border-color: transparent;
            background-color: #059669;
        }

        /* Daha az opak, daha az belirgin bir cam efekti */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* HARCAMA DETAYI MODAL BAŞLIĞI: Sade ve Profesyonel Mavi-Menekşe */
        .fixed-gradient-header {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #8b5cf6 100%);
            position: relative;
            overflow: hidden;
            /* Hafif, soft gölge */
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        /* YENİ KAYIT EKRANI İÇİN MODAL SARIYICI */
        .form-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            background-color: rgba(0, 0, 0, 0.85);
            /* Daha koyu arka plan */
            backdrop-filter: blur(8px);
            overflow-y: auto;
            display: flex;
            justify-content: center;
            padding: 1rem;
        }

        /* Form içeriği için max-height ayarı */
        .form-content-box {
            max-height: 95vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Harcama listesindeki şehir başlığı için yeni stil */
        .city-header-gradient {
            background: linear-gradient(90deg, #1e293b 0%, #1f2937 80%, rgba(30, 41, 59, 0) 100%);
        }

        /* Ana menü butonu stili */
        .menu-btn-base {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0.2rem;
            border-radius: 0.75rem;
            transition: all 0.3s;
            border-width: 1px;
        }

        .menu-btn-icon-box {
            width: 2.2rem;
            height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            margin-bottom: 0.25rem;
        }

        /* KRİTİK DÜZELTME İÇİN EK STİL: Inputların dikeyde tam doldurmasını sağlamak için */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            /* Etiket ve input arasına boşluk */
        }

        /* DİĞER SEKME KART MODAL STİLLERİ */
        .helper-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        .helper-modal:target, .helper-modal.active {
            display: flex;
        }

        /* --- PREMIUM AUTH MODAL ANIMATION --- */
        #auth-login-modal {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        #auth-login-modal.active {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }
        #auth-login-modal.active > div {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
        #auth-login-modal > div {
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .helper-modal-inner {
            background-color: #020617;
            /* slate-950 */
            border-radius: 0.75rem;
            border: 1px solid rgba(148, 163, 184, 0.5);
            padding: 1.25rem;
            max-width: 42rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .helper-modal-close {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
        }

        /* ASİSTAN PREMİUM BENTO GRID STİLLERİ */
        .asistan-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: minmax(80px, auto);
            gap: 0.75rem;
        }
        .asistan-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .asistan-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .asistan-card:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .asistan-card:hover::before { opacity: 1; }
        .asistan-card-span-3 { grid-column: span 3; }
        .asistan-card-span-2 { grid-column: span 2; }
        .asistan-card-span-4 { grid-column: span 4; }
        
        .asistan-icon {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        .asistan-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #f1f5f9;
            line-height: 1.1;
        }
        .asistan-sub {
            font-size: 0.65rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }
        .asistan-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 2rem;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>

</head>

<body class="min-h-screen bg-[#0F111A] text-slate-200 flex justify-center p-4 selection:bg-blue-500/30">

                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>

                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>

    <div id="app-root" class="w-full max-w-xl md:max-w-2xl"></div>

    <script>
        (() => {
            // --- Firebase Auth + Misafir Limitleri ---
            const firebaseConfig = {
                apiKey: "AIzaSyDiZ7KZBF1bPb185duB0iIXvtqrdfJ91e8",
                authDomain: "seyahat-takip.firebaseapp.com",
                projectId: "seyahat-takip",
                storageBucket: "seyahat-takip.firebasestorage.app",
                messagingSenderId: "740530417306",
                appId: "1:740530417306:web:62b1538f1f85fa9e8c7923",
                measurementId: "G-68BX89MR14"
            };

            let auth = null;
            let currentUser = null;
            let db = null;
            let isCloudLoading = false;
            let isCloudSaving = false;


            function initFirebaseAuth() {
                try {
                    if (typeof firebase !== 'undefined') {
                        if (!firebase.apps || !firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        auth = firebase.auth();
                        if (firebase.firestore) {
                            db = firebase.firestore();
                        }
                        auth.onAuthStateChanged(user => {
                            console.log('onAuthStateChanged, user:', user);
                            currentUser = user;
                            updateAuthUi();
                            if (currentUser) {
                                loadUserDataFromCloud();
                            }
                        });
                    } else {
                        console.warn('Firebase yüklü değil');
                    }
                } catch (err) {
                    console.error('Firebase init hatası', err);
                }
            }

            function updateAuthUi() {
                const loginBtn = document.getElementById('auth-btn-login-toggle');
                const logoutBtn = document.getElementById('auth-logout-btn');
                const userMenu = document.getElementById('auth-user-menu');
                if (!loginBtn) return;

                // Varsayılan hali: misafir (gri ikon)
                loginBtn.classList.remove('bg-emerald-500/80', 'border-emerald-400');
                loginBtn.classList.add('bg-slate-800/70', 'border-slate-600');

                if (logoutBtn) {
                    logoutBtn.classList.add('hidden');
                }
                if (userMenu && !currentUser) {
                    userMenu.classList.add('hidden');
                }

                if (currentUser) {
                    // Giriş yapılmışsa: ikon yeşil
                    loginBtn.classList.remove('bg-slate-800/70', 'border-slate-600');
                    loginBtn.classList.add('bg-emerald-500/80', 'border-emerald-400');

                    if (logoutBtn) {
                        logoutBtn.classList.remove('hidden');
                    }
                }
            }


            function openLoginModal(message) {
                const modal = document.getElementById('auth-login-modal');
                const msg = document.getElementById('auth-login-message');
                if (msg) {
                    if (currentUser) {
                        msg.textContent = 'Şu anda giriş yapmış durumdasınız. İsterseniz aşağıdan çıkış yapabilirsiniz.';
                    } else if (message) {
                        msg.textContent = message;
                    } else {
                        msg.textContent = 'Tüm seyahat verilerinizi bulutta güvenle saklamak için giriş yapın.';
                    }
                }
                if (modal) {
                    modal.classList.add('active');
                }
            }

            function closeLoginModal() {
                const modal = document.getElementById('auth-login-modal');
                if (modal) {
                    modal.classList.remove('active');
                }
            }


            function toggleUserMenu(forceHide = false) {
                const menu = document.getElementById('auth-user-menu');
                const emailEl = document.getElementById('auth-user-email');
                if (!menu) return;

                if (forceHide) {
                    menu.classList.add('hidden');
                    return;
                }

                if (currentUser && emailEl) {
                    emailEl.textContent = currentUser.email || currentUser.displayName || 'Oturum açıldı';
                }

                menu.classList.toggle('hidden');
            }

            function isGuest() {
                return !currentUser;
            }

            function getDistinctTripsAll() {
                const fromExp = (state && state.exp ? state.exp : []).map(x => x.trip).filter(Boolean);
                const fromRes = (state && state.res ? state.res : []).map(x => x.trip).filter(Boolean);
                return [...new Set([...fromExp, ...fromRes])];
            }

            function getCurrencyForTrip(tripName) {
                if (!tripName) return state.baseCurrency || BASE_CURRENCY;
                const t = String(tripName || '').toLowerCase();
                const fromExp = (state && state.exp ? state.exp : [])
                    .filter(x => (x.trip || '').toLowerCase() === t && x.cur);
                if (!fromExp.length) return state.baseCurrency || BASE_CURRENCY;
                const freq = {};
                fromExp.forEach(x => {
                    const cur = x.cur || BASE_CURRENCY;
                    freq[cur] = (freq[cur] || 0) + 1;
                });
                return Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
            }


            function guestTripLimitExceeded(newTripName) {
                if (!newTripName) return false;
                const trips = getDistinctTripsAll();
                const exists = trips.includes(newTripName);
                return (!exists && trips.length >= 2);
            }

            function guestExpenseLimitExceeded(tripName) {
                if (!tripName || !state || !state.exp) return false;
                const count = state.exp.filter(x => x.trip === tripName).length;
                return count >= 3;
            }

            // --- Sabitler ---
            const K = { EXP: 'travel_expenses', LIST: 'travel_checklist', BUD: 'travel_budget', PREF: 'travel_pref', NOTES: 'travel_notes', RES: 'travel_reservations', TRIPS: 'travel_trips', TRANS: 'travel_transfers' };
            const AVAILABLE_CURRENCIES = ['TRY', 'EUR', 'USD', 'GBP', 'JPY', 'CAD', 'AUD'];

            // YENİ FOTOĞRAF SABİTLERİ
            const MAX_IMAGES = 3;
            const MAX_IMAGE_WIDTH = 800;

            let EXCHANGE_RATES = {
                TRY: 1.0,
                USD: 42.51920, // Dinamik Kur: USD/TRY (Mock)
                EUR: 49.55726, // Dinamik Kur: EUR/TRY (Mock)
                GBP: 52.00,
                JPY: 0.28,
                CAD: 31.00,
                AUD: 29.00,
            };
            let BASE_CURRENCY = 'TRY';
            let rateLastUpdated = 'Statik (Başlangıç)';

            // YENİ SABİT: HARCAMA TİPİ
            const EXPENSE_TYPES = [
                { id: 'card', l: 'Kart' },
                { id: 'cash', l: 'Nakit' },
                { id: 'other', l: 'Diğer' }
            ];

            // YENİ SABİT: REZERVASYON TİPLERİ
            const RESERVATION_TYPES = [
                { id: 'flight', l: 'Uçak Bileti', i: '✈️', color: 'from-blue-600 to-sky-500' },
                { id: 'hotel', l: 'Otel/Konaklama', i: '🏨', color: 'from-emerald-600 to-teal-500' },
                { id: 'activity', l: 'Etkinlik/Bilet', i: '🎟️', color: 'from-purple-600 to-fuchsia-500' },
                { id: 'transport', l: 'Tren/Otobüs', i: '🚌', color: 'from-orange-600 to-amber-500' },
                { id: 'other', l: 'Diğer', i: '📝', color: 'from-slate-600 to-gray-500' },
            ];


            // YENİ SABİT: BİREYSEL/ORTAK FİLTRE TİPLERİ
            const INDIVIDUAL_FILTERS = [
                { id: '', l: 'Tüm Harcamalar' },
                { id: 'individual', l: 'Bireysel' },
                { id: 'shared', l: 'Ortak' }
            ];


            let chartInst = null, state = {};

            // Harcamayı ana para birimine dönüştürür
            function convertToBase(amount, currency, targetCurrency = BASE_CURRENCY, tripName = null) {
                amount = Number(amount) || 0;
                currency = currency || 'TRY';
                targetCurrency = targetCurrency || 'TRY';

                if (currency === targetCurrency) return amount;

                // Seyahat kilitliyse onun kurlarını kullan
                let activeRates = EXCHANGE_RATES;
                if (tripName) {
                    const trip = (state.trips || []).find(t => t.name === tripName);
                    if (trip && trip.status === 'completed' && trip.lockedRates) {
                        activeRates = trip.lockedRates;
                    }
                }

                const rateToTry = activeRates[currency];
                const rateFromTry = activeRates[targetCurrency];

                if (!rateToTry || !rateFromTry) {
                    console.warn(`Bilinmeyen kur: ${currency} veya ${targetCurrency}. Dönüşüm başarısız.`);
                    return amount;
                }

                // TRY'ye dönüştür, sonra hedef para birimine
                const amountInTry = amount * rateToTry;
                return amountInTry / rateFromTry;
            }

            // --- KRİTİK FONKSİYON: GERÇEK ZAMANLI KUR ÇEKİMİ ---
            async function fetchAndApplyRates() {
                try {
                    const response = await fetch('https://open.er-api.com/v6/latest/TRY');
                    const data = await response.json();
                    
                    if (data && data.rates) {
                        // API 1 TRY = X USD veriyor, biz 1 USD = X TRY istiyoruz
                        const rates = data.rates;
                        const currencies = ['USD', 'EUR', 'GBP', 'JPY', 'CAD', 'AUD'];
                        
                        currencies.forEach(cur => {
                            if (rates[cur]) {
                                EXCHANGE_RATES[cur] = 1 / rates[cur];
                            }
                        });

                        const now = new Date();
                        rateLastUpdated = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} (Canlı)`;
                        console.log('Kurlar Güncellendi (Canlı):', EXCHANGE_RATES);
                    }
                } catch (e) {
                    console.error("Kur çekme hatası:", e);
                    rateLastUpdated = 'Hata (Sabitler Kullanılıyor)';
                }
                renderApp();
            }

            // Rapor için harcama listesini getirir
            function getTripExpenses(tripName) {
                if (!tripName) return [];
                // Sadece seçili seyahatin harcamalarını getir
                return state.exp.filter(x => x.trip === tripName && !isNaN(Number(x.amt)) && Number(x.amt) > 0);
            }

                const esc = (str) => String(str || '').replace(/[&<>"]/g, c => ({

                    const key = String(id || '').trim();
                    if (!key) return '';

                            if (CATS[key] && CATS[key].l) return CATS[key].l;
                            const hit = Object.values(CATS).find(x => x && x.id === key);
                            if (hit && hit.l) return hit.l;

                    } catch (e) { }
                    return key;

                const expRows = payload.expenses.map(e => `

          <td class="amt-cell">${fmt(convertToBase(Number(e.amt)||0, e.cur || reportCur, reportCur))} <span style="font-size:10px; color:#64748b;">${esc(reportCur)}</span></td>
          <td><span class="badge ${e.isIndividual ? 'badge-ind' : 'badge-shared'}">${e.isIndividual ? 'Bireysel' : 'Ortak'}</span>${(!e.isIndividual && e.isSettled) ? ` <span class="badge badge-settled">Ödendi</span>` : ''}</td>
        </tr>
    `).join('');

                const resRows = payload.reservations.map(r => `
        <tr>
          <td>${esc(r.startDate || '')}</td>

<td class="amt-cell">${fmt(convertToBase(Number(r.cost)||0, r.cur || reportCur, reportCur))} <span style="font-size:10px; color:#64748b;">${esc(reportCur)}</span></td>

<td><strong>${esc(t.from || '')}</strong> → <strong>${esc(t.to || '')}</strong></td>

<body>

            // --- HARCAMA GRAFİĞİ VE RAPOR VERİ HAZIRLAMA ---
            function getChartDataset(expenses = state.exp) {
                // Önce grafik için temel veri setini belirle
                const base = (state._visibleExp && state._visibleExp.length && expenses === state.exp)
                    ? state._visibleExp
                    : expenses;

                const allExp = base.filter(x => !isNaN(Number(x.amt)) && Number(x.amt) > 0);

                if (!allExp.length) {
                    return {
                        labels: [],
                        data: [],
                        colors: [],
                        currency: state.chartCurrency || BASE_CURRENCY,
                        total: 0,
                        trips: [],
                        currencies: [],
                        perCat: {}
                    };
                }

                // Ekranda bulunan kayıtların para birimleri
                const currencies = [...new Set(allExp.map(x => x.cur || BASE_CURRENCY))];

                // 1) Seçili seyahate göre para birimi (öncelik buraya verilecek)
                let cur = null;
                if (state.tripFilter) {
                    const tripExps = allExp.filter(x => x.trip === state.tripFilter);
                    const tripCurrencies = [...new Set(tripExps.map(x => x.cur || BASE_CURRENCY))];

                    // Seçili seyahatte tek bir para birimi varsa onu kullan
                    if (tripCurrencies.length === 1) {
                        cur = tripCurrencies[0];
                    }
                }

                // 2) Hâlâ belirlenmediyse; kullanıcı seçimi veya varsayılan
                if (!cur) {
                    cur = state.chartCurrency || BASE_CURRENCY;
                    if (!currencies.includes(cur)) {
                        cur = currencies[0] || BASE_CURRENCY;
                    }
                }

                // Bu fonksiyon state.exp için çağrılıyorsa, seçilen para birimini state'te sakla
                if (expenses === state.exp) {
                    state.chartCurrency = cur;
                }

                // Grafik için tüm harcamaları hedef para birimine dönüştür
                const perCat = {};
                allExp.forEach(x => {
                    const cat = x.cat || 'other';
                    const amtInCur = convertToBase(Number(x.amt) || 0, x.cur || BASE_CURRENCY, cur, x.trip);
                    perCat[cat] = (perCat[cat] || 0) + amtInCur;
                });

                const keys = Object.keys(perCat);
                const labels = keys.map(id => (CATS[id] && CATS[id].l) || id);
                const data = keys.map(id => perCat[id]);
                const colors = keys.map(id => (CATS[id] && CATS[id].c) || 'rgba(148,163,184,0.8)');
                const trips = [...new Set(allExp.map(x => x.trip || 'Genel'))];
                const total = data.reduce((a, b) => a + b, 0);

                return {
                    labels,
                    data,
                    colors,
                    currency: cur,
                    currencies,
                    total,
                    trips,
                    perCat
                };
            }

            function getGoogleCalendarUrl(res) {
                const formatDate = (dateStr) => dateStr.replace(/-/g, '');

                const start = formatDate(res.startDate);

                // Bitiş tarihi hesapla (Tüm gün etkinliği için +1 gün)
                const parts = (res.endDate || res.startDate).split('-');
                const eDate = new Date(parts[0], parts[1] - 1, parts[2]);
                eDate.setDate(eDate.getDate() + 1);

                const y = eDate.getFullYear();
                const m = String(eDate.getMonth() + 1).padStart(2, '0');
                const d = String(eDate.getDate()).padStart(2, '0');
                const end = `${y}${m}${d}`;

                const typeName = (RESERVATION_TYPES.find(t => t.id === res.type) || {}).l || 'Rezervasyon';
                const title = encodeURIComponent(`${typeName}: ${res.name}`);

                const details = encodeURIComponent(
                    `Seyahat: ${res.trip || '-'}\n` +
                    `Kod/PNR: ${res.code || '-'}\n` +
                    `Maliyet: ${res.cost ? res.cost + ' ' + res.cur : '-'}\n\n` +
                    `Notlar:\n${res.notes || '-'}`
                );

                const location = encodeURIComponent(res.location || '');

                return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}&location=${location}`;
            }

            // YENİ FONKSİYON: ICS Dosyası İndir (iPhone/Android Yerel Takvim İçin)
            function downloadICS(resId) {
                const res = state.res.find(r => r.id === resId);
                if (!res) return;

                const typeName = (RESERVATION_TYPES.find(t => t.id === res.type) || {}).l || 'Rezervasyon';
                const title = `${typeName}: ${res.name}`;
                const details = `Seyahat: ${res.trip || '-'}\nKod/PNR: ${res.code || '-'}\nMaliyet: ${res.cost ? res.cost + ' ' + res.cur : '-'}\n\nNotlar:\n${res.notes || '-'}`;
                const location = res.location || '';

                const formatDate = (dateStr, timeStr = '090000') => {
                    if (!dateStr) return '';
                    return dateStr.replace(/-/g, '') + 'T' + timeStr + 'Z';
                };

                const start = formatDate(res.startDate, '090000');
                // Bitiş tarihi yoksa başlangıçla aynı gün yap
                const end = formatDate(res.endDate || res.startDate, '100000');

                const now = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
                const uid = (res.id || Math.random()) + '@tripledger.com';
                const icsEsc = (str) => (str || '').replace(/[\\,;]/g, (m) => '\\' + m).replace(/\n/g, '\\n');

                const icsContent = [
                    'BEGIN:VCALENDAR',
                    'VERSION:2.0',
                    'PRODID:-//TripLedger//TR',
                    'BEGIN:VEVENT',
                    `UID:${uid}`,
                    `DTSTAMP:${now}`,
                    `SUMMARY:${icsEsc(title)}`,
                    `DTSTART:${start}`,
                    `DTEND:${end}`,
                    `LOCATION:${icsEsc(location)}`,
                    `DESCRIPTION:${icsEsc(details)}`,
                    'END:VEVENT',
                    'END:VCALENDAR'
                ].join('\r\n');

                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const url = URL.createObjectURL(blob);

                if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    // iPhone Safari için en kararlı yöntem: Data URI (Base64)
                    const dataUri = 'data:text/calendar;charset=utf-8;base64,' + btoa(unescape(encodeURIComponent(icsContent)));
                    window.location.href = dataUri;
                } else {
                    const link = document.createElement('a');
                    link.href = url;
                    link.setAttribute('download', 'rezervasyon.ics');
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
                setTimeout(() => URL.revokeObjectURL(url), 60000);
            }

            // --- UNDO (Geri Al) Mekanizması ---
            let undoTimer = null;
            function setUndo(entry) {
                try {
                    const id = genId();
                    state.undo = { id, ...entry, expiresAt: Date.now() + 10_000 };
                    if (undoTimer) clearTimeout(undoTimer);
                    undoTimer = setTimeout(() => {
                        if (state.undo && state.undo.id === id) {
                            state.undo = null;
                            renderApp();
                        }
                    }, 10_200);
                } catch (err) { console.error(err); }
            }

            function performUndo() {
                try {
                    const u = state.undo;
                    if (!u) return;
                    state.undo = null;

                    switch (u.kind) {
                        case 'exp':
                            if (u.item) state.exp.push(u.item);
                            break;
                        case 'res':
                            if (u.item) state.res.push(u.item);
                            break;
                        case 'transfer':
                            if (u.item) state.transfers.push(u.item);
                            break;
                        case 'note':
                            if (u.item) state.criticalNotes.push(u.item);
                            break;
                        case 'chk-item':
                            if (u.item) state.chk.items.push(u.item);
                            break;
                        case 'chk-cat':
                            if (u.cat) state.chk.cats.push(u.cat);
                            if (Array.isArray(u.items) && u.items.length) state.chk.items.push(...u.items);
                            if (u.cat && state.openChkCats) state.openChkCats[u.cat.id] = false;
                            break;
                        case 'trip':
                            if (u.trip && !state.trips.some(t => String(t.id) === String(u.trip.id))) state.trips.push(u.trip);
                            if (Array.isArray(u.exp) && u.exp.length) state.exp.push(...u.exp);
                            if (Array.isArray(u.res) && u.res.length) state.res.push(...u.res);
                            if (Array.isArray(u.notes) && u.notes.length) state.criticalNotes.push(...u.notes);
                            break;
                        case 'img':
                            if (typeof u.index === 'number' && u.data) {
                                state.form.imgs.splice(u.index, 0, u.data);
                            }
                            break;
                        default:
                            break;
                    }

                    save();
                    renderApp();
                } catch (err) { console.error(err); }
            }

            function getUserDocRef() {

            function loadUserDataFromCloud() {
                if (!db || !currentUser || isCloudLoading) return;
                const ref = getUserDocRef();
                if (!ref) return;
                isCloudLoading = true;
                ref.get()
                    .then(snap => {
                        if (!snap.exists) {
                            saveStateToCloud();
                            return;
                        }
                        const data = snap.data() || {};
                        try {
                            if (Array.isArray(data.exp)) {
                                state.exp = data.exp;
                            }
                            if (Array.isArray(data.res)) {
                                state.res = data.res;
                            }
                            if (data.chk) {
                                state.chk = data.chk;
                            }
                            if (Array.isArray(data.criticalNotes)) {
                                state.criticalNotes = data.criticalNotes;
                            }
                            if (data.targetTimezone) {
                                state.targetTimezone = data.targetTimezone;
                            }
                            if (data.baseCurrency) {
                                state.baseCurrency = data.baseCurrency;
                                state.reportCurrency = data.baseCurrency;
                                state.reportCurrency = data.baseCurrency;
                                state.chartCurrency = data.baseCurrency;
                            }
                            if (Array.isArray(data.trips)) {
                                state.trips = data.trips;
                            }
                            if (Array.isArray(data.transfers)) {
                                state.transfers = data.transfers;
                            }
                            // LocalStorage'i de güncelle
                            save();
                            renderApp();
                        } catch (err) {
                            console.error('Bulut verisi state\'e uygulanırken hata oluştu', err);
                        }
                    })
                    .catch(err => {
                        console.error('Bulut verisi okunamadı', err);
                    })
                    .finally(() => {
                        isCloudLoading = false;
                    });
            }

            function saveStateToCloud() {
                if (!db || !currentUser || isCloudSaving) return;
                const ref = getUserDocRef();
                if (!ref) return;
                const payload = {
                    exp: state.exp || [],
                    res: state.res || [],
                    chk: state.chk || {},

                    targetTimezone: state.targetTimezone || '',
                    baseCurrency: state.baseCurrency || 'TRY',
                    trips: state.trips || [],

                ref.set(payload, { merge: true })

                    .finally(() => {

            // --- RESİM YENİDEN BOYUTLANDIRMA VE BASE64'E DÖNÜŞTÜRME YARDIMCISI ---
            const resizeAndConvertImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (readerEvent) => {
                        const image = new Image();
                        image.onload = (imageEvent) => {
                            let canvas = document.createElement('canvas'),
                                max_size = MAX_IMAGE_WIDTH,
                                width = image.width,
                                height = image.height;

                            if (width > height) {
                                if (width > max_size) {
                                    height *= max_size / width;
                                    width = max_size;
                                }
                            } else {
                                if (height > max_size) {
                                    width *= max_size / height;
                                    height = max_size;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            canvas.getContext('2d').drawImage(image, 0, 0, width, height);

                            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            resolve(dataUrl);
                        };
                        image.onerror = () => {
                            reject(new Error("Resim formatı desteklenmiyor veya bozuk."));
                        };
                        image.src = readerEvent.target.result;
                    };
                    reader.onerror = () => {
                        reject(new Error("Dosya okuma hatası. Dosya bozuk olabilir."));
                    };
                    reader.readAsDataURL(file);
                });
            };

            // --- KONUM YÖNETİMİ ---
            const handleGeolocation = () => {
                if (state.locationLoading || state.location) return;

                if (!navigator.geolocation) {
                    setState({
                        err: 'Tarayıcınız Konum Servislerini desteklemiyor.',
                        locationLoading: false,
                        location: null,
                        locationName: 'Bilinmiyor'
                    });
                    return;
                }

                setState({ locationLoading: true, err: '', locationName: 'Alınıyor...' });

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;

                        // Coğrafi koordinatlardan şehir ismini almak için ters geocoding
                        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;

                        fetch(url, {
                            headers: {
                                'Accept-Language': 'tr'
                            }
                        })
                            .then(resp => resp.json())
                            .then(data => {
                                const addr = data && data.address ? data.address : {};
                                const city =
                                    addr.city ||
                                    addr.town ||
                                    addr.village ||
                                    addr.suburb ||
                                    addr.state ||
                                    data.display_name ||
                                    'Bilinmeyen Konum';

                                setState({
                                    location: { lat, lng: lon },
                                    locationLoading: false,
                                    locationName: city,
                                    err: ''
                                });
                            })
                            .catch(() => {
                                setState({
                                    location: { lat, lng: lon },
                                    locationLoading: false,
                                    locationName: 'Konum Bulunamadı',
                                    err: ''
                                });
                            });
                    },
                    (error) => {
                        let message = 'Konum bilgisi alınamadı.';
                        if (error.code === error.PERMISSION_DENIED) {
                            message = 'Konum erişimi reddedildi. İzin vermeyi deneyin.';
                        } else if (error.code === error.POSITION_UNAVAILABLE) {
                            message = 'Konum bilgisi mevcut değil.';
                        } else if (error.code === error.TIMEOUT) {
                            message = 'Konum bilgisi zaman aşımına uğradı.';
                        }

                        setState({
                            err: message,
                            locationLoading: false,
                            location: null,
                            locationName: 'Bilinmiyor'
                        });
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            };

            // --- YARDIMCI FONKSİYON: Tüm Seyahatleri Getir (Harcama + Rezervasyon + Liste) ---
            function getDistinctTripsAll() {
                const tripsFromExp = state.exp.map(x => x.trip).filter(Boolean);
                const tripsFromRes = state.res.map(x => x.trip).filter(Boolean);
                const tripsFromList = state.trips.map(x => x.name).filter(Boolean);
                return [...new Set([...tripsFromExp, ...tripsFromRes, ...tripsFromList])];

            // --- YARDIMCI FONKSİYON: Rota Oluşturma Linki (MEKAN BAZLI) ---
            const getRouteUrl = (tripName) => {
                const tripExpenses = state.exp
                    .filter(x => x.trip === tripName)
                    .sort((a, b) => (a.date || '').localeCompare(b.date));

                let uniquePoints = [];
                tripExpenses.forEach(x => {
                    const point = x.place.trim() + ', ' + x.city.trim();

                    if (x.place.trim() && x.city.trim() && (uniquePoints.length === 0 || uniquePoints[uniquePoints.length - 1] !== point)) {
                        uniquePoints.push(point);
                    }
                });

                if (uniquePoints.length < 2) {
                    return { url: '', points: uniquePoints, error: 'Rota için en az 2 farklı Mekan kaydı gerekiyor.' };
                }

                const url = `https://www.google.com/maps/dir/${uniquePoints.map(p => encodeURIComponent(p)).join('/')}`;

                return { url, points: uniquePoints, error: '' };
            };

            // KRİTİK DÜZELTME: AKORDİYON ITEM RENDERER GENEL ALANA TAŞINDI
            const accordionItem = (id, icon, title, content) => {

                const maxHeight = (id === 'critical' || id === 'report' || id === 'route' || id === 'reservations') ? '900px' : '500px';

                return `
          <div id="helper-${id}" class="bg-slate-800/60 rounded-xl border border-slate-700/50 shadow-lg overflow-hidden">

                  <span class="text-slate-600 transform transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}">
                      ${ICONS.down.replace('w-4 h-4', 'w-4 h-4')}

              <div class="transition-all duration-300 ease-in-out overflow-hidden" style="max-height: ${isOpen ? maxHeight : '0'};">
                  <div class="p-4 pt-0">
                      ${content}
                  </div>
              </div>
          </div>
      `;
            };

            // YENİ FONKSİYON: REZERVASYON LİSTESİNİ RENDER ET
            function renderReservationList() {
                const activeTripNames = (state.trips || []).filter(t => t.status !== 'completed').map(t => t.name);
                const allReservations = state.res
                    .filter(r => {
                        const isFiltered = state.tripFilter ? r.trip === state.tripFilter : true;
                        const isActive = !r.trip || r.trip === 'Genel' || activeTripNames.includes(r.trip);
                        return isFiltered && isActive;
                    })
                    .sort((a, b) => (a.startDate || '').localeCompare(b.startDate));

                if (!allReservations.length) {
                    const msg = state.tripFilter ? `"${state.tripFilter}" seyahati için rezervasyon bulunamadı.` : 'Kayıtlı rezervasyon bulunamadı.';
                    return `<div class="text-center py-8 text-slate-500 text-sm border border-dashed border-slate-800 rounded-xl">${msg}</div>`;
                }

                return `
          <div class="space-y-3">
              ${allReservations.map(r => {
                    const type = RESERVATION_TYPES.find(t => t.id === r.type) || RESERVATION_TYPES[0];

                    // Tarihleri hesapla
                    const startDate = fmtDate(r.startDate);
                    const endDate = r.endDate ? fmtDate(r.endDate) : '';
                    // Artık sadece başlangıç tarihini göster
                    const dateText = startDate;


                    // Fiyat
                    const costText = r.cost ? `${fmtNum(r.cost)} ${r.cur}` : 'Ücret: -';

                    return `
                      <div data-act="res-detail" data-id="${r.id}" class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 flex justify-between items-start gap-3 cursor-pointer hover:bg-slate-800 transition">

                          <div class="flex items-start gap-3 flex-1 min-w-0">
                              <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gradient-to-br ${type.color} text-xl shadow-md flex-shrink-0">${type.i}</div>

                                  <div class="text-xs text-slate-400 mt-0.5 line-clamp-1">${esc(r.location)} · ${esc(r.trip)}</div>
                              </div>
                          </div>
                          
                          <!-- Sağ: Tarih ve Fiyat -->
                          <div class="text-right flex-shrink-0">
                              <div class="text-xs font-bold text-slate-200">${dateText}</div>
                              <div class="text-[10px] font-medium text-slate-500 mt-0.5">${costText}</div>
                          </div>
                      </div>
                  `;
                }).join('')}
          </div>
      `;
            }

                 </div>
              </div>
              
              <!-- TARİH (REZERVASYON) -->
<div class="mt-3">

              <!-- BİREYSEL / ORTAK -->

                             </div>
                          </div>
                         `;
                        }
                        return '';
                    })()}
              </div>

              <!-- NOTLAR -->

                const startDate = fmtDate(r.startDate);

                const dateText = endDate && startDate !== endDate ? `${startDate} - ${endDate}` : startDate;

                const costText = r.cost ? `${fmtNum(r.cost)} ${r.cur}` : 'Ücretsiz / Bilinmiyor';

            // YENİ FONKSİYON: BORÇ HESAPLAMA
            function calculateDebts(tripName) {
                const trip = (state.trips || []).find(t => t.name === tripName);
                if (!trip || !trip.persons) return null;

                const persons = trip.persons.split(',').map(p => p.trim()).filter(Boolean);
                if (persons.length < 2) return null;

                const baseCur = state.reportCurrency || state.baseCurrency || BASE_CURRENCY;

                // Herkesin bakiyesi (pozitif: alacaklı, negatif: borçlu)
                // NOT: "Ödendi/Mahsuplaşıldı" işaretli rezervasyonlar alacak-verecek hesabına DAHİL EDİLMEZ,
                // fakat kişi başı harcama payına (toplam tüketim) DAHİL EDİLİR.
                const balances = {};
                const personPayments = {};       // Mahsuplaşma hesabına dahil ödemeler (borç/alacak hesabı)
                const personPaymentsAll = {};    // Toplam ödemeler (settled dahil, ödeyen bilgisi varsa)

                persons.forEach(p => {
                    balances[p] = 0;
                    personPayments[p] = 0;
                    personPaymentsAll[p] = 0;
                });

                let totalSharedAll = 0;          // Ortak harcamaların toplamı (settled dahil)
                let totalSharedForSettlement = 0; // Mahsuplaşma hesabına dahil ortak harcama toplamı (settled hariç)

                // 1) Ortak Harcamalar (günlük harcamalar) - Settled alanı yoksa tamamı mahsuba dahildir
                const sharedExps = (state.exp || []).filter(x => x.trip === tripName && !x.isIndividual);
                sharedExps.forEach(x => {
                    const amt = Number(x.amt) || 0;
                    if (amt <= 0) return;

                    const amtCtx = convertToBase(amt, x.cur, baseCur);
                    if (!amtCtx || isNaN(amtCtx)) return;

                    totalSharedAll += amtCtx;

                    const payerRaw = (x.payer && String(x.payer).trim()) ? String(x.payer).trim() : '';
                    if (payerRaw && personPaymentsAll.hasOwnProperty(payerRaw)) {
                        personPaymentsAll[payerRaw] += amtCtx;
                    }

                    // Mahsuplaşma hesabına sadece "Ödendi" olmayan kayıtlar dahil edilir
                    if (!x.isSettled) {
                        totalSharedForSettlement += amtCtx;

                        const payer = payerRaw || persons[0];
                        if (balances.hasOwnProperty(payer)) {
                            balances[payer] += amtCtx;
                            personPayments[payer] += amtCtx;
                        }
                    }
                });

                // 2) Ortak Rezervasyonlar (konaklama/ulaşım vb.)
                const sharedRes = (state.res || []).filter(r => r.trip === tripName && !r.isIndividual);
                sharedRes.forEach(r => {
                    const cost = Number(r.cost) || 0;
                    if (cost <= 0) return;

                    const amtCtx = convertToBase(cost, r.cur, baseCur);
                    if (!amtCtx || isNaN(amtCtx)) return;

                    // Toplam tüketime her durumda dahil
                    totalSharedAll += amtCtx;

                    // Ödeyen bilgisi varsa, toplam ödeme istatistiğine ekle (settled dahil)
                    const payerRaw = (r.payer && String(r.payer).trim()) ? String(r.payer).trim() : '';
                    if (payerRaw && personPaymentsAll.hasOwnProperty(payerRaw)) {
                        personPaymentsAll[payerRaw] += amtCtx;
                    }

                    // Mahsuplaşma hesabına sadece "Ödendi" olmayan kayıtlar dahil edilir
                    if (!r.isSettled) {
                        totalSharedForSettlement += amtCtx;

                        const payer = payerRaw || persons[0];
                        if (balances.hasOwnProperty(payer)) {
                            balances[payer] += amtCtx;
                            personPayments[payer] += amtCtx;
                        }
                    }
                });

                if (totalSharedAll <= 0) return null;

                const sharePerPersonAll = totalSharedAll / persons.length;
                const sharePerPersonForSettlement = totalSharedForSettlement / persons.length;

                // Mahsuplaşma hesabı için net bakiye: Ödediği (mahsuba dahil) - Kişi payı (mahsuba dahil)
                persons.forEach(p => {
                    balances[p] -= sharePerPersonForSettlement;
                });


                // 3) Mahsuplaşmalar / Transferler (tüketime dahil değil, borç-alacak bakiyesini düzeltir)
                const balancesBeforeTransfers = { ...balances };
                const transfersRaw = (state.transfers || []).filter(t => t && t.trip === tripName);
                const appliedTransfers = [];
                transfersRaw.forEach(tr => {
                    const from = (tr.from || '').trim();
                    const to = (tr.to || '').trim();
                    const amt = Number(tr.amt) || 0;
                    if (!from || !to || from === to || amt <= 0) return;
                    if (!balances.hasOwnProperty(from) || !balances.hasOwnProperty(to)) return;

                    const cur = tr.cur || baseCur;
                    const amtCtx = convertToBase(amt, cur, baseCur);
                    if (!amtCtx || isNaN(amtCtx)) return;

                    // from -> to ödeme yapıldı: from bakiyesi artar (borcu azalır), to bakiyesi azalır (alacağı azalır)
                    balances[from] += amtCtx;
                    balances[to] -= amtCtx;

                    appliedTransfers.push({
                        id: tr.id || genId(),
                        trip: tripName,
                        date: tr.date || '',
                        from,
                        to,
                        amt: amtCtx,
                        cur: baseCur,
                        note: tr.note || ''
                    });
                });

                // Borçlu/alacaklı listesi
                const debtors = [];
                const creditors = [];

                Object.entries(balances).forEach(([p, bal]) => {
                    if (bal < -0.01) debtors.push({ p, bal });
                    else if (bal > 0.01) creditors.push({ p, bal });
                });

                const transactions = [];

                debtors.sort((a, b) => a.bal - b.bal);     // En çok borcu olan önce
                creditors.sort((a, b) => b.bal - a.bal);   // En çok alacağı olan önce

                let i = 0; // debtor index
                let j = 0; // creditor index

                while (i < debtors.length && j < creditors.length) {
                    const debtor = debtors[i];
                    const creditor = creditors[j];

                    const amount = Math.min(-debtor.bal, creditor.bal);

                    transactions.push({
                        from: debtor.p,
                        to: creditor.p,
                        amount: Math.round(amount * 100) / 100
                    });

                    debtor.bal += amount;
                    creditor.bal -= amount;

                    if (Math.abs(debtor.bal) < 0.01) i++;
                    if (creditor.bal < 0.01) j++;
                }

                return {
                    // Ekran/PDF istatistikleri için toplam tüketim
                    totalShared: totalSharedAll,
                    sharePerPerson: sharePerPersonAll,

                    // Borç/alacak hesabı (settled hariç)
                    totalSharedForSettlement,
                    sharePerPersonForSettlement,

                    transactions,
                    currency: baseCur,


                    balancesBeforeTransfers,
                    balancesAfterTransfers: { ...balances },
                    transfers: appliedTransfers,

                    // Kişi bazlı
                    personPayments,        // mahsuba dahil ödemeler
                    personPaymentsAll,     // toplam ödemeler (ödeyen bilgisi varsa)
                    persons
                };
            }

                } else if (debtInfo) {

            // YENİ FONKSİYON: Rota Planlayıcı İçeriğini Oluştur (MEKAN BAZLI)
            function renderRoutePlanner() {
                const selectedTrip = state.routeTrip || state.tripFilter;

                if (!selectedTrip || selectedTrip === "") {
                    return `
              <div class="text-center py-4 bg-slate-900/50 rounded-lg text-sm text-slate-500">
                  Lütfen yukarıdan bir seyahat seçin.
              </div>
          `;
                }

                const routeData = getRouteUrl(selectedTrip);

                if (routeData.error) {
                    return `
              <div class="text-center py-4 bg-red-900/30 border border-red-800 rounded-lg text-sm text-red-300">
                  ${routeData.error}
              </div>
          `;
                }

                const pointsList = routeData.points.map((point, index) => {
                    let icon = '📍';
                    if (index === 0) icon = '🛫';
                    else if (index === routeData.points.length - 1) icon = '🏁';

                    const [place, city] = point.split(',').map(s => s.trim());

                    return `
              <li class="flex items-start gap-2 text-sm text-slate-300 border-l border-slate-700/50 ml-3 pl-3 py-1 -my-1">
                  <span class="w-5 flex-shrink-0 text-center -ml-5 pt-1">${icon}</span> 
                  <div>
                      <div class="font-bold text-white">${esc(place)}</div>
                      <div class="text-[10px] text-slate-500">${esc(city)}</div>
                  </div>
              </li>
          `;
                }).join('');

                return `
          <div class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 space-y-3">
              <h4 class="text-sm font-bold text-slate-300">Oluşturulan Rota Sırası (Mekan Bazlı):</h4>
              <ul class="list-none space-y-1 p-0 m-0 max-h-40 overflow-y-auto scrl">
                  ${pointsList}
              </ul>
              
              <a href="${routeData.url}" target="_blank" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-sm font-bold transition w-full">
                 ${ICONS.globe.replace('w-4 h-4', 'w-4 h-4')} Rota Haritasını Aç (Google Maps)
              </a>
          </div>
      `;
            }

            // YENİ FONKSİYON: RAPOR HTML OLUŞTURUCU
            function buildReportHtmlLegacy(data) {
                const { trip, reportCurrency, generatedAt, summary, expenses, reservations } = data;

                const fmt = (n) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
                const escStr = (s) => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

                // CSS
                const style = `
                    <style>
                        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background: #f8fafc; color: #1e293b; }
                        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

                        .header h1 { margin: 0; color: #0f172a; font-size: 24px; }
                        .meta { color: #64748b; font-size: 12px; margin-top: 5px; }
                        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
                        .card { background: #f1f5f9; padding: 15px; border-radius: 8px; }
                        .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; font-weight: 700; margin-bottom: 5px; }
                        .card-val { font-size: 18px; font-weight: 700; color: #0f172a; }
                        .section-title { font-size: 16px; font-weight: 700; color: #334155; margin-top: 30px; margin-bottom: 10px; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px; }
                        table { w-full; border-collapse: collapse; font-size: 12px; width: 100%; }
                        th { text-align: left; padding: 8px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; color: #475569; font-weight: 600; }
                        td { padding: 8px; border-bottom: 1px solid #e2e8f0; color: #334155; vertical-align: top; }
                        tr:last-child td { border-bottom: none; }
                        .amt { text-align: right; font-weight: 600; white-space: nowrap; }
                        .note { font-size: 10px; color: #94a3b8; display: block; margin-top: 2px; }
                        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
                        .badge-ind { background: #fff7ed; color: #c2410c; }
                        .badge-shared { background: #f0fdf4; color: #15803d; }
                        .badge-settled { background: #eff6ff; color: #1d4ed8; margin-left: 4px; }
                        .payer-info { font-size: 10px; color: #64748b; margin-top: 2px; font-style: italic; }
                        .footer { margin-top: 40px; text-align: center; color: #94a3b8; font-size: 11px; }
                    </style>
                `;

                // Expenses Table
                let expRows = '';
                if (expenses.length > 0) {
                    expRows = `
                        <table>
                            <thead><tr><th>Tarih</th><th>Kategori / Mekan</th><th class="amt">Tutar</th></tr></thead>
                            <tbody>
                                ${expenses.map(x => `
                                    <tr>
                                        <td width="15%">${x.date}<br><span class="note">${x.time}</span></td>
                                        <td>
                                            <span style="font-weight:600">${escStr(x.cat)}</span> ${x.place ? ' / ' + escStr(x.place) : ''}<br>
                                            <span class="note">${escStr(x.city)}</span>
                                            ${x.note ? `<div class="note">Is Not: ${escStr(x.note)}</div>` : ''}
                                            ${x.payer ? `<div class="payer-info">Ödeyen: ${escStr(x.payer)}</div>` : ''}
                                        </td>
                                        <td class="amt">
                                            ${fmt(convertToBase(Number(x.amt)||0, x.cur || reportCurrency, reportCurrency, x.trip))} ${reportCurrency}
                                            <div style="margin-top:2px">
                                                <span class="badge ${x.isIndividual ? 'badge-ind' : 'badge-shared'}">${x.isIndividual ? 'Bireysel' : 'Ortak'}</span>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    expRows = '<p style="color:#64748b; font-size:12px; font-style:italic">Harcama kaydı bulunmamaktadır.</p>';
                }

                // Reservations Table
                let resRows = '';
                if (reservations.length > 0) {
                    resRows = `
                        <table>
                            <thead><tr><th>Tarih</th><th>Rezervasyon</th><th class="amt">Maliyet</th></tr></thead>

                                ${reservations.map(r => `

                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    resRows = '<p style="color:#64748b; font-size:12px; font-style:italic">Rezervasyon bulunmamaktadır.</p>';
                }

                return `
                    <!DOCTYPE html>
                    <html>
                    <head><meta charset="utf-8"><title>${escStr(trip)} - Seyahat Raporu</title>${style}</head>
                    <body>
                        <div class="container">
                            <div class="header">
                                <h1>${escStr(trip)} - Seyahat Harcama Raporu</h1>
